<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WC2026 Final Stage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000000; color: #ffffff; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; padding-bottom: 140px; }
        .active-content { display: block; }
        
        /* 下部メニュー：iPhone15一画面に収める設定 */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #171717; display: flex; justify-content: space-around; padding: 10px 2px; z-index: 50; border-top: 1px solid #262626; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .nav-item { color: #737373; text-align: center; font-size: 10px; font-weight: bold; flex: 1; padding: 8px 0; border-radius: 12px; transition: all 0.2s; margin: 0 1px; white-space: nowrap; }
        .nav-item.active-tab { background: #ffffff; color: #000000; }

        /* リストデザイン */
        .row-container { display: flex; align-items: center; width: 100%; background: #111; border-bottom: 1px solid #222; padding: 14px 2px; white-space: nowrap; font-size: 11px; }
        .col-team   { width: 115px; display: flex; align-items: center; font-weight: 900; padding-left: 6px; }
        .col-player { width: 75px; color: #525252; overflow: hidden; text-overflow: ellipsis; }
        .col-val    { width: 34px; text-align: center; font-weight: bold; }
        .col-result { width: 105px; text-align: center; font-weight: 900; color: #3b82f6; }
        .val-zero   { color: #333; }
        .flag-icon { width: 20px; height: 14px; margin-right: 6px; border: 1px solid #333; flex-shrink: 0; }

        /* トーナメントカード */
        .match-card { background: #111; border: 1px solid #262626; border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
        .section-title { font-size: 10px; font-weight: 900; color: #fbbf24; letter-spacing: 0.1em; padding: 15px 4px 5px 4px; text-transform: uppercase; }
        .owner-ebi { border-left: 4px solid #ef4444 !important; }
        .owner-gatchi { border-left: 4px solid #3b82f6 !important; }
        .owner-taichi { border-left: 4px solid #10b981 !important; }
        
        .winner-row { 
            background: #262626 !important; 
            box-shadow: inset 0 0 15px rgba(251, 191, 36, 0.4);
            border-top: 1px solid rgba(251, 191, 36, 0.5);
            border-bottom: 1px solid rgba(251, 191, 36, 0.5);
        }
        .winner-row .team-text { color: #fbbf24 !important; font-weight: 900; text-shadow: 0 0 8px rgba(251, 191, 36, 0.6); }

        .player-detail { display: none; }
        .player-detail.open { display: block; }
        .modal-bg { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px); }
        input, select { background: #262626 !important; border: 1px solid #404040 !important; color: white !important; outline: none; }
    </style>
</head>
<body>

    <div id="player-tab" class="tab-content active-content"><div id="player-list"></div></div>
    <div id="gs-tab" class="tab-content"><div id="gs-list"></div></div>
    <div id="r32-tab" class="tab-content"><div id="r32-list" class="p-4"></div></div>
    <div id="r16-tab" class="tab-content"><div id="r16-list" class="p-4"></div></div>
    <div id="qf-tab" class="tab-content"><div id="qf-list" class="p-4"></div></div>
    <div id="sf-final-tab" class="tab-content"><div id="sf-final-list" class="p-4"></div></div>
    <div id="rules-tab" class="tab-content"><div id="rules-list"></div></div>

    <nav class="bottom-nav">
        <button id="btn-player" onclick="showTab('player-tab')" class="nav-item active-tab">Player</button>
        <button id="btn-gs" onclick="showTab('gs-tab')" class="nav-item">GS</button>
        <button id="btn-r32" onclick="showTab('r32-tab')" class="nav-item">R32</button>
        <button id="btn-r16" onclick="showTab('r16-tab')" class="nav-item">R16</button>
        <button id="btn-qf" onclick="showTab('qf-tab')" class="nav-item">QF</button>
        <button id="btn-sf-final" onclick="showTab('sf-final-tab')" class="nav-item">SF/Final</button>
        <button id="btn-rules" onclick="showTab('rules-tab')" class="nav-item">Rules</button>
    </nav>

    <div id="edit-modal" class="hidden fixed inset-0 modal-bg flex items-center justify-center p-4 z-[100]">
        <div class="bg-[#171717] p-6 rounded-2xl w-full max-w-sm border border-neutral-800 shadow-2xl">
            <h2 id="modal-team-name" class="text-xl font-bold mb-6 text-white text-center">Update Status</h2>
            <div id="modal-gs-fields" class="space-y-4 text-sm mb-4">
                <div class="flex justify-between items-center"><label class="text-neutral-400">Win</label><input type="number" id="edit-win" class="rounded-lg w-20 p-2 text-center font-bold"></div>
                <div class="flex justify-between items-center"><label class="text-neutral-400">Draw</label><input type="number" id="edit-draw" class="rounded-lg w-20 p-2 text-center font-bold"></div>
                <div class="flex justify-between items-center"><label class="text-neutral-400">Lose</label><input type="number" id="edit-lose" class="rounded-lg w-20 p-2 text-center font-bold"></div>
            </div>
            <div class="flex flex-col gap-1 mb-6">
                <label class="text-neutral-400 text-sm">Result Status</label>
                <select id="edit-result-status" class="rounded-lg w-full p-3 font-bold">
                    <option value="">-</option><option value="GS敗退">GS敗退</option><option value="ベスト32">ベスト32</option>
                    <option value="ベスト16">ベスト16</option><option value="ベスト8">ベスト8</option><option value="4位">4位</option>
                    <option value="3位">3位</option><option value="準優勝">準優勝</option><option value="優勝">優勝</option>
                </select>
            </div>
            <div class="flex gap-3">
                <button onclick="submitUpdate()" id="save-btn" class="flex-1 bg-white text-black py-3 rounded-xl font-bold">Save</button>
                <button onclick="closeModal()" class="flex-1 bg-neutral-800 text-white py-3 rounded-xl font-bold">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyNG9kLk837e5hbvoC_G2ten_HyPID0Znp3_atCkieLVkP8FrGit5skyaSbjHnyBw3S/exec";
        
        const flagMap = { "日本": "jp", "韓国": "kr", "中国": "cn", "オーストラリア": "au", "サウジアラビア": "sa", "イラン": "ir", "カタール": "qa", "フランス": "fr", "スペイン": "es", "ドイツ": "de", "イタリア": "it", "イングランド": "gb", "ポルトガル": "pt", "オランダ": "nl", "クロアチア": "hr", "アメリカ": "us", "メキシコ": "mx", "mexico": "mx", "カナダ": "ca", "アルゼンチン": "ar", "ブラジル": "br", "ウルグアイ": "uy", "コロンビア": "co", "モロッコ": "ma", "セネガル": "sn", "ハイチ": "ht", "キュラソー": "cw", "カーボベルデ": "cv", "コンゴ": "cg", "ボスニア・ヘルツェゴヴィナ": "ba", "チェコ": "cz", "南アフリカ": "za", "パラグアイ": "py", "スウェーデン": "se", "オーストリア": "at", "ノルウェー": "no", "エクアドル": "ec", "アルジェリア": "dz", "ガーナ": "gh", "エジプト": "eg", "コートジボワール": "ci" };
        const ownerClasses = { "えび": "owner-ebi", "がっち": "owner-gatchi", "たいち": "owner-taichi" };
        const bracketOrder = ["南アフリカ", "カナダ", "オランダ", "モロッコ", "ドイツ", "パラグアイ", "フランス", "スウェーデン", "ベルギー", "セネガル", "アメリカ", "ボスニア・ヘルツェゴヴィナ", "スペイン", "オーストリア", "ポルトガル", "クロアチア", "ブラジル", "日本", "コートジボワール", "ノルウェー", "メキシコ", "エクアドル", "イングランド", "コンゴ", "スイス", "アルジェリア", "コロンビア", "ガーナ", "オーストラリア", "エジプト", "アルゼンチン", "カーボベルデ"];

        const statusRank = { "":0, "-":0, "GS敗退":1, "ベスト32":2, "ベスト16":3, "ベスト8":4, "4位":5, "3位":6, "準優勝":7, "優勝":8 };
        const roundTargetRank = { 32: 3, 16: 4, 8: 5, 4: 7, 2: 8, "3rd": 6 };

        let db = { result: [], players: [], rules: [] };
        let tournament = { 32: [], 16: [], 8: [], 4: [], 2: [], "3rd": [] };

        async function loadData(keepTab = true) {
            try {
                const res = await fetch(API_URL);
                db = await res.json();
                initTournamentStructure();
                renderAll();
                if (!keepTab) showTab('player-tab');
            } catch (e) { console.error(e); }
        }

        function initTournamentStructure() {
            // R32
            tournament[32] = [];
            for (let i = 0; i < 16; i++) {
                const t1 = db.result.find(d => d.Team === bracketOrder[i*2]);
                const t2 = db.result.find(d => d.Team === bracketOrder[i*2+1]);
                const match = { teams: [createTeamObj(t1), createTeamObj(t2)], winner: null };
                if (match.teams[0] && statusRank[match.teams[0].status] >= roundTargetRank[32]) match.winner = 0;
                else if (match.teams[1] && statusRank[match.teams[1].status] >= roundTargetRank[32]) match.winner = 1;
                tournament[32].push(match);
            }

            // R16, QF, SF
            [16, 8, 4].forEach(r => {
                const prev = r === 16 ? 32 : r === 8 ? 16 : 8;
                tournament[r] = [];
                for (let i = 0; i < prev/4; i++) {
                    const m1 = tournament[prev][i*2];
                    const m2 = tournament[prev][i*2+1];
                    const team1 = m1.winner !== null ? m1.teams[m1.winner] : null;
                    const team2 = m2.winner !== null ? m2.teams[m2.winner] : null;
                    const match = { teams: [team1, team2], winner: null };
                    if (team1 && statusRank[team1.status] >= roundTargetRank[r]) match.winner = 0;
                    else if (team2 && statusRank[team2.status] >= roundTargetRank[r]) match.winner = 1;
                    tournament[r].push(match);
                }
            });

            // Final & 3rd Place (SFの結果から生成)
            const sf1 = tournament[4][0];
            const sf2 = tournament[4][1];
            
            // Final
            const f1 = sf1.winner !== null ? sf1.teams[sf1.winner] : null;
            const f2 = sf2.winner !== null ? sf2.teams[sf2.winner] : null;
            const finalMatch = { teams: [f1, f2], winner: null };
            if (f1 && statusRank[f1.status] >= roundTargetRank[2]) finalMatch.winner = 0;
            else if (f2 && statusRank[f2.status] >= roundTargetRank[2]) finalMatch.winner = 1;
            tournament[2] = [finalMatch];

            // 3rd Place
            const t3_1 = sf1.winner !== null ? sf1.teams[1 - sf1.winner] : null;
            const t3_2 = sf2.winner !== null ? sf2.teams[1 - sf2.winner] : null;
            const thirdMatch = { teams: [t3_1, t3_2], winner: null };
            if (t3_1 && statusRank[t3_1.status] >= roundTargetRank["3rd"]) thirdMatch.winner = 0;
            else if (t3_2 && statusRank[t3_2.status] >= roundTargetRank["3rd"]) thirdMatch.winner = 1;
            tournament["3rd"] = [thirdMatch];
        }

        function createTeamObj(t) {
            return t ? { name: t.Team, owner: t.Player, flag: flagMap[t.Team] || "un", status: t.Result } : null;
        }

        function renderAll() {
            renderGS();
            [32, 16, 8].forEach(r => renderBracket(r));
            renderSF-Final();
            renderPlayers();
            renderRules();
        }

        function renderBracket(round) {
            const id = `${round === 32 ? 'r32' : round === 16 ? 'r16' : 'qf'}-list`;
            const container = document.getElementById(id);
            container.innerHTML = "";
            tournament[round].forEach((match, mIdx) => {
                container.innerHTML += createMatchHtml(match, round, mIdx);
            });
        }

        function renderSF-Final() {
            const container = document.getElementById('sf-final-list');
            container.innerHTML = `<div class="section-title">Semi Finals</div>`;
            tournament[4].forEach((m, i) => container.innerHTML += createMatchHtml(m, 4, i));
            
            container.innerHTML += `<div class="section-title">3rd Place Match</div>`;
            container.innerHTML += createMatchHtml(tournament["3rd"][0], "3rd", 0);

            container.innerHTML += `<div class="section-title">Final</div>`;
            container.innerHTML += createMatchHtml(tournament[2][0], 2, 0);
        }

        function createMatchHtml(match, round, mIdx) {
            let html = `<div class="match-card">`;
            match.teams.forEach((team, tIdx) => {
                const ownerClass = team ? (ownerClasses[team.owner] || "") : "";
                const isWinner = match.winner === tIdx;
                html += `<div id="node-${round}-${mIdx}-${tIdx}" onclick="handleTournamentClick('${round}', ${mIdx}, ${tIdx})" class="flex items-center justify-between p-4 transition-all duration-200 ${ownerClass} ${isWinner ? 'winner-row' : ''}">
                    <div class="flex items-center space-x-3 flex-1">
                        <img src="https://flagcdn.com/w40/${team ? team.flag : 'un'}.png" class="flag-icon">
                        <span class="team-text text-[13px] font-bold ${!team ? 'text-neutral-800' : ''}">${team ? team.name : 'TBD'}</span>
                    </div>
                    <span class="text-[9px] font-black text-neutral-500 uppercase w-10 text-right">${team ? team.owner : ''}</span>
                </div>${tIdx === 0 ? '<div class="h-[1px] bg-neutral-800/40 mx-4"></div>' : ''}`;
            });
            return html + `</div>`;
        }

        function handleTournamentClick(round, mIdx, tIdx) {
            const match = tournament[round][mIdx];
            const team = match.teams[tIdx];
            if (!team) return;
            const element = document.getElementById(`node-${round}-${mIdx}-${tIdx}`);

            if (match.winner === tIdx) {
                element.classList.remove('winner-row');
                const prevStatus = { "32":"ベスト32", "16":"ベスト16", "8":"ベスト8", "4":"ベスト8", "2":"準優勝", "3rd":"4位" }[round];
                updateStatusDirectly(team.name, prevStatus);
            } else {
                openEditModal(team.name, false);
            }
        }

        async function updateStatusDirectly(teamName, status) {
            try {
                await fetch(API_URL, { method: "POST", mode: 'no-cors', body: JSON.stringify({ team: teamName, resultStatus: status }) });
                loadData(true);
            } catch (e) { console.error(e); }
        }

        function renderGS() {
            const container = document.getElementById('gs-list');
            container.innerHTML = "";
            const groups = db.result.reduce((acc, row) => {
                const g = row.Group || "-";
                if (!acc[g]) acc[g] = [];
                const w = parseInt(row.Win) || 0;
                const d = parseInt(row.Draw) || 0;
                acc[g].push({ ...row, pts: w*3+d });
                return acc;
            }, {});
            Object.keys(groups).sort().forEach(gName => {
                const sorted = groups[gName].sort((a,b) => b.pts - a.pts);
                let html = `<div class="mb-4"><div class="bg-neutral-800 text-neutral-500 p-2 px-4 font-bold text-[10px] tracking-widest uppercase">GROUP ${gName}</div><div class="row-container bg-neutral-900 text-[9px] font-bold text-neutral-600 border-b border-neutral-800"><div class="col-team">TEAM</div><div class="col-player">PLAYER</div><div class="col-val">W</div><div class="col-val">D</div><div class="col-val">L</div><div class="col-result">RESULT</div></div>`;
                sorted.forEach(row => {
                    html += `<div class="row-container" onclick="openEditModal('${row.Team}', true)">
                        <div class="col-team"><img src="https://flagcdn.com/w40/${flagMap[row.Team] || 'un'}.png" class="flag-icon"><span>${row.Team}</span></div>
                        <div class="col-player">${row.Player || '-'}</div>
                        <div class="col-val ${row.Win > 0 ? '' : 'val-zero'}">${row.Win || 0}</div>
                        <div class="col-val ${row.Draw > 0 ? '' : 'val-zero'}">${row.Draw || 0}</div>
                        <div class="col-val ${row.Lose > 0 ? '' : 'val-zero'}">${row.Lose || 0}</div>
                        <div class="col-result truncate text-right pr-2">${row.Result || '-'}</div>
                    </div>`;
                });
                container.innerHTML += html + `</div>`;
            });
        }

        function renderPlayers() {
            const container = document.getElementById('player-list');
            const pData = db.players.reduce((acc, row) => {
                const n = row.Player || "Unknown";
                if (!acc[n]) acc[n] = { teams: [], total: row["Total Points"] || 0 };
                acc[n].teams.push(row);
                return acc;
            }, {});
            container.innerHTML = Object.entries(pData).map(([name, info], idx) => `
                <div class="mb-4 bg-neutral-900 border border-neutral-800 overflow-hidden shadow-xl">
                    <div onclick="togglePlayer(${idx})" class="bg-neutral-800 p-5 flex justify-between items-center px-4 cursor-pointer">
                        <span class="text-xl font-bold">${name}</span>
                        <div class="flex items-center space-x-4">
                            <div class="text-right"><span class="text-[10px] block text-neutral-500 font-bold uppercase">Total Points</span><span class="text-3xl font-black text-yellow-500">${info.total}</span></div>
                            <span id="arrow-${idx}" class="text-neutral-500">▼</span>
                        </div>
                    </div>
                    <div id="detail-${idx}" class="player-detail">
                        ${info.teams.map(t => `<div class="flex p-4 border-b border-neutral-800 text-sm items-center bg-black/40"><div class="flex-1 flex items-center font-bold text-[13px]"><img src="https://flagcdn.com/w40/${flagMap[t.Team] || 'un'}.png" class="flag-icon"><span>${t.Team}</span></div><div class="flex-1 text-center text-neutral-400 text-xs">${t.Result || '-'}</div><div class="flex-1 text-right font-bold text-blue-500">${t.Points || 0} pt</div></div>`).join('')}
                    </div>
                </div>`).join('');
        }

        function togglePlayer(idx) {
            const detail = document.getElementById(`detail-${idx}`);
            const arrow = document.getElementById(`arrow-${
