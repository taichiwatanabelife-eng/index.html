<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORLDCUP 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .flag-icon { width: 20px; height: 14px; object-fit: cover; margin-right: 4px; border: 1px solid #ddd; }
        .tab-content { display: none; padding-bottom: 80px; }
        .active { display: block; }
        /* 下部メニュー用のスタイル */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1e3a8a; display: flex; justify-content: space-around; padding: 12px; z-index: 50; }
        .nav-item { color: white; text-align: center; font-size: 14px; font-weight: bold; flex: 1; }
        /* マトリクス表示の調整 */
        .grid-header { display: grid; grid-template-cols: 3fr 1.5fr 1fr 1fr 1fr 2fr; gap: 4px; font-size: 10px; color: #666; font-weight: bold; padding: 4px 8px; border-bottom: 1px solid #eee; }
        .grid-row { display: grid; grid-template-cols: 3fr 1.5fr 1fr 1fr 1fr 2fr; gap: 4px; align-items: center; padding: 10px 8px; border-bottom: 1px solid #f0f0f0; background: white; font-size: 13px; }
    </style>
</head>
<body class="bg-gray-50">

    <!-- メインコンテンツ -->
    <div id="result-tab" class="tab-content active">
        <div id="result-list">読み込み中...</div>
    </div>

    <div id="player-tab" class="tab-content">
        <div id="player-list">読み込み中...</div>
    </div>

    <!-- 下部メニュー -->
    <nav class="bottom-nav shadow-2xl">
        <button onclick="showTab('result-tab')" class="nav-item">Result</button>
        <button onclick="showTab('player-tab')" class="nav-item border-l border-blue-800">Player</button>
    </nav>

    <!-- 更新モーダル (Result用) -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-[100]">
        <div class="bg-white p-6 rounded-xl w-full max-w-sm shadow-2xl">
            <h2 id="modal-team-name" class="text-xl font-bold mb-4 text-blue-900 text-center">Update Status</h2>
            <div class="space-y-4">
                <div class="flex justify-between items-center gap-2">
                    <label class="text-sm font-bold w-16">Win</label>
                    <input type="number" id="edit-win" class="border rounded w-full p-2 text-center bg-gray-50">
                </div>
                <div class="flex justify-between items-center gap-2">
                    <label class="text-sm font-bold w-16">Draw</label>
                    <input type="number" id="edit-draw" class="border rounded w-full p-2 text-center bg-gray-50">
                </div>
                <div class="flex justify-between items-center gap-2">
                    <label class="text-sm font-bold w-16">Lose</label>
                    <input type="number" id="edit-lose" class="border rounded w-full p-2 text-center bg-gray-50">
                </div>
                <div class="flex justify-between items-center gap-2">
                    <label class="text-sm font-bold w-16">Result</label>
                    <select id="edit-result-status" class="border rounded w-full p-2 bg-gray-50">
                        <option value="GS敗退">GS敗退</option>
                        <option value="Best 16">Best 16</option>
                        <option value="Best 8">Best 8</option>
                        <option value="準決勝">準決勝</option>
                        <option value="準優勝">準優勝</option>
                        <option value="優勝">優勝</option>
                    </select>
                </div>
                <div class="pt-4 flex gap-2">
                    <button onclick="submitUpdate()" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-bold shadow-md hover:bg-blue-700">Save</button>
                    <button onclick="closeModal()" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-lg font-bold hover:bg-gray-300">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxjOJLiIpiE58ivDd472FYPD6A7uYWdPs0iN4-PSIHj7VujnyH-2LwbRrzjiuuuyc0/exec";

        const flagMap = {
            "日本": "jp", "アルゼンチン": "ar", "フランス": "fr", "スペイン": "es", 
            "ドイツ": "de", "ブラジル": "br", "イングランド": "gb", "モロッコ": "ma",
            "イタリア": "it", "クロアチア": "hr", "アメリカ": "us", "メキシコ": "mx"
        };

        let currentData = null;

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                currentData = await res.json();
                renderResult(currentData.result);
                renderPlayers(currentData.players);
            } catch (e) {
                console.error(e);
                alert("データの読み込みに失敗しました。");
            }
        }

        function renderResult(data) {
            const container = document.getElementById('result-list');
            const groups = data.reduce((acc, row) => {
                if (!acc[row.Group]) acc[row.Group] = [];
                acc[row.Group].push(row);
                return acc;
            }, {});

            container.innerHTML = Object.keys(groups).sort().map(groupName => `
                <div class="mb-6 bg-white">
                    <div class="bg-blue-900 text-white p-2 font-bold flex justify-between px-4">
                        <span>Group ${groupName}</span>
                    </div>
                    <div class="grid-header">
                        <div>Team</div><div>Player</div><div>W</div><div>D</div><div>L</div><div>Result</div>
                    </div>
                    ${groups[groupName].map(row => `
                        <div class="grid-row" onclick="openModal('${row.Team}', ${row.Win}, ${row.Draw}, ${row.Lose}, '${row.Result}')">
                            <div class="flex items-center font-bold">
                                <img src="https://flagcdn.com/w40/${flagMap[row.Team] || 'un'}.png" class="flag-icon">
                                <span class="truncate">${row.Team}</span>
                            </div>
                            <div class="text-gray-500 truncate text-[11px]">${row.Player || '-'}</div>
                            <div class="text-center">${row.Win}</div>
                            <div class="text-center">${row.Draw}</div>
                            <div class="text-center">${row.Lose}</div>
                            <div class="text-blue-600 font-bold text-center text-[11px]">${row.Result}</div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        function renderPlayers(data) {
            const container = document.getElementById('player-list');
            const players = data.reduce((acc, row) => {
                const pName = row.Player || "Unknown";
                if (!acc[pName]) acc[pName] = { teams: [], total: row["Total Points"] || 0 };
                acc[pName].teams.push(row);
                return acc;
            }, {});

            container.innerHTML = Object.entries(players).map(([name, info]) => `
                <div class="mb-6 bg-white shadow-sm overflow-hidden">
                    <div class="bg-gray-800 text-white p-3 flex justify-between items-center px-4">
                        <span class="text-lg font-bold">${name}</span>
                        <div class="text-right">
                            <span class="text-xs block text-gray-400">Total Points</span>
                            <span class="text-xl font-bold text-yellow-400">${info.total}</span>
                        </div>
                    </div>
                    <div class="grid-header bg-gray-50">
                        <div>Team</div><div>Result</div><div>Points</div><div></div><div></div><div></div>
                    </div>
                    ${info.teams.map(t => `
                        <div class="grid-row" style="grid-template-cols: 3fr 3fr 2fr;">
                            <div class="flex items-center">
                                <img src="https://flagcdn.com/w40/${flagMap[t.Team] || 'un'}.png" class="flag-icon">
                                <span>${t.Team}</span>
                            </div>
                            <div class="text-gray-600">${t.Result || '-'}</div>
