<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORLDCUP 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .flag-icon { width: 18px; height: 12px; object-fit: cover; margin-right: 4px; border: 1px solid #ddd; flex-shrink: 0; }
        .tab-content { display: none; padding-bottom: 100px; }
        .active { display: block; }
        
        /* 下部ナビゲーション */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1e3a8a; display: flex; justify-content: space-around; padding: 15px; z-index: 50; }
        .nav-item { color: white; text-align: center; font-size: 16px; font-weight: bold; flex: 1; }

        /* --- Resultシート用の横並びグリッド設定 --- */
        /* 列構成: Team(1.5), Player(1), Win(0.7), Draw(0.7), Lose(0.7), Result(1.2), Edit(0.3) */
        .res-grid-container {
            display: grid;
            grid-template-cols: 1.5fr 1fr 0.7fr 0.7fr 0.7fr 1.2fr 0.3fr;
            gap: 2px;
            align-items: center;
            text-align: center;
            font-size: 11px; /* スマホで収まるように小さめ */
        }
        .grid-header { background: #f1f5f9; color: #475569; font-weight: bold; padding: 10px 4px; border-bottom: 2px solid #cbd5e1; }
        .grid-row { background: white; padding: 12px 4px; border-bottom: 1px solid #e2e8f0; cursor: pointer; }
        .team-cell { text-align: left; display: flex; align-items: center; font-weight: bold; overflow: hidden; white-space: nowrap; }
        .player-cell { text-align: left; color: #64748b; overflow: hidden; white-space: nowrap; }

        /* --- Playerシート用の横並びグリッド設定 --- */
        .ply-grid-container {
            display: grid;
            grid-template-cols: 1.5fr 1.5fr 1fr;
            gap: 10px;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #f1f5f9;
        }
        .ply-header { background: #f8fafc; font-size: 11px; font-weight: bold; color: #64748b; border-bottom: 1px solid #e2e8f0; }
    </style>
</head>
<body class="bg-gray-100">

    <!-- Resultタブ -->
    <div id="result-tab" class="tab-content active">
        <div id="result-list">読み込み中...</div>
    </div>

    <!-- Playerタブ -->
    <div id="player-tab" class="tab-content">
        <div id="player-list">読み込み中...</div>
    </div>

    <!-- 下部メニュー -->
    <nav class="bottom-nav">
        <button onclick="showTab('result-tab')" class="nav-item">Result</button>
        <button onclick="showTab('player-tab')" class="nav-item border-l border-blue-700">Player</button>
    </nav>

    <!-- 編集モーダル -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 z-[100]">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm shadow-2xl">
            <h2 id="modal-team-name" class="text-xl font-bold mb-6 text-blue-900 text-center">数値を入力</h2>
            <div class="space-y-4">
                <div class="flex justify-between items-center"><label class="font-bold">Win</label><input type="number" id="edit-win" class="border-2 rounded-lg w-24 p-2 text-center"></div>
                <div class="flex justify-between items-center"><label class="font-bold">Draw</label><input type="number" id="edit-draw" class="border-2 rounded-lg w-24 p-2 text-center"></div>
                <div class="flex justify-between items-center"><label class="font-bold">Lose</label><input type="number" id="edit-lose" class="border-2 rounded-lg w-24 p-2 text-center"></div>
                <div class="flex flex-col gap-1">
                    <label class="font-bold">Result</label>
                    <select id="edit-result-status" class="border-2 rounded-lg w-full p-2 bg-gray-50">
                        <option value="GS敗退">GS敗退</option>
                        <option value="Best 16">Best 16</option>
                        <option value="Best 8">Best 8</option>
                        <option value="準決勝">準決勝</option>
                        <option value="準優勝">準優勝</option>
                        <option value="優勝">優勝</option>
                    </select>
                </div>
                <div class="pt-4 flex gap-2">
                    <button onclick="submitUpdate()" id="save-btn" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold">Save</button>
                    <button onclick="closeModal()" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-xl font-bold">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxjOJLiIpiE58ivDd472FYPD6A7uYWdPs0iN4-PSIHj7VujnyH-2LwbRrzjiuuuyc0/exec";

        const flagMap = {
            "日本": "jp", "アルゼンチン": "ar", "フランス": "fr", "スペイン": "es", "ドイツ": "de", "ブラジル": "br", "イングランド": "gb", "モロッコ": "ma"
        };

        let currentData = null;

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                currentData = await res.json();
                renderResult(currentData.result);
                renderPlayers(currentData.players);
            } catch (e) { console.error(e); }
        }

        function renderResult(data) {
            const container = document.getElementById('result-list');
            const groups = data.reduce((acc, row) => {
                if (!acc[row.Group]) acc[row.Group] = [];
                acc[row.Group].push(row);
                return acc;
            }, {});

            container.innerHTML = Object.keys(groups).sort().map(groupName => `
                <div class="mb-4 bg-white shadow-sm overflow-x-auto">
                    <div class="bg-blue-900 text-white p-2 px-4 font-bold text-sm">Group ${groupName}</div>
                    <!-- ヘッダー項目：Win, Draw, Loseをフルスペルで横並び -->
                    <div class="res-grid-container grid-header">
                        <div class="text-left pl-2">Team</div>
                        <div class="text-left">Player</div>
                        <div>Win</div>
                        <div>Draw</div>
                        <div>Lose</div>
                        <div>Result</div>
                        <div></div>
                    </div>
                    ${groups[groupName].map(row => `
                        <div class="res-grid-container grid-row" onclick="openModal('${row.Team}', ${row.Win || 0}, ${row.Draw || 0}, ${row.Lose || 0}, '${row.Result || 'GS敗退'}')">
                            <div class="team-cell pl-2">
                                <img src="https://flagcdn.com/w40/${flagMap[row.Team] || 'un'}.png" class="flag-icon">
                                <span>${row.Team}</span>
                            </div>
                            <div class="player-cell">${row.Player || '-'}</div>
                            <div>${row.Win || 0}</div>
                            <div>${row.Draw || 0}</div>
                            <div>${row.Lose || 0}</div>
                            <div class="text-blue-600 font-bold">${row.Result || '-'}</div>
                            <div class="text-gray-300 text-[10px]">✎</div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        function renderPlayers(data) {
            const container = document.getElementById('player-list');
            const players = data.reduce((acc, row) => {
                const p = row.Player || "Unknown";
                if (!acc[p]) acc[p] = { teams: [], total: row["Total Points"] || 0 };
                acc[p].teams.push(row);
                return acc;
            }, {});

            container.innerHTML = Object.entries(players).map(([name, info]) => `
                <div class="mb-6 bg-white shadow mx-2 mt-4 rounded-lg overflow-hidden">
                    <div class="bg-gray-800 text-white p-4 flex justify-between items-center">
                        <span class="text-lg font-bold">${name}</span>
                        <div class="text-right">
                            <span class="text-[10px] block text-gray-400">Total Points</span>
                            <span class="text-2xl font-bold text-yellow-400">${info.total}</span>
                        </div>
                    </div>
                    <div class="ply-grid-container ply-header">
                        <div>Team</div><div>Result</div><div class="text-right">Points</div>
                    </div>
                    ${info.teams.map(t => `
                        <div class="ply-grid-container">
                            <div class="flex items-center font-bold text-sm">
                                <img src="https://flagcdn.com/w40/${flagMap[t.Team] || 'un'}.png" class="flag-icon">
                                <span>${t.Team}</span>
                            </div>
                            <div class="text-gray-600 text-xs">${t.Result || '-'}</div>
                            <div class="font-bold text-right text-blue-600">${t.Points || 0} pt</div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        // --- 編集機能の仕組み ---
        let editingTeam = "";
        function openModal(team, win, draw, lose, status) {
            editingTeam = team;
            document.getElementById('modal-team-name').innerText = team;
            document.getElementById('edit-win').value = win;
            document.getElementById('edit-draw').value = draw;
            document.getElementById('edit-lose').value = lose;
            document.getElementById('edit-result-status').value = status;
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('edit-modal').classList.add('hidden'); }

        async function submitUpdate() {
            const btn = document.getElementById('save-btn');
            const payload = {
                team: editingTeam,
                win: parseInt(document.getElementById('edit-win').value) || 0,
                draw: parseInt(document.getElementById('edit-draw').value) || 0,
                lose: parseInt(document.getElementById('edit-lose').value) || 0,
                resultStatus: document.getElementById('edit-result-status').value
            };

            btn.innerText = "Saving...";
            btn.disabled = true;

            try {
                await fetch(API_URL, { method: "POST", mode: 'no-cors', body: JSON.stringify(payload) });
                setTimeout(() => {
                    closeModal();
                    loadData();
                    btn.innerText = "Save";
                    btn.disabled = false;
                }, 1200);
            } catch (e) { alert("Error"); btn.disabled = false; }
        }

        loadData();
    </script>
</body>
</html>
