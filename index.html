<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WORLDCUP 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f9; }
        .tab-content { display: none; padding-bottom: 100px; }
        .active { display: block; }
        .row-container { display: flex; align-items: center; width: 100%; background: white; border-bottom: 1px solid #edf2f7; padding: 12px 4px; white-space: nowrap; font-size: 11px; }
        .header-row { background: #f8fafc; font-weight: bold; color: #64748b; font-size: 10px; }
        .col-team   { width: 105px; display: flex; align-items: center; font-weight: 800; overflow: hidden; padding-left: 4px; }
        .col-player { width: 70px;  color: #94a3b8; overflow: hidden; text-overflow: ellipsis; }
        .col-val    { width: 32px;  text-align: center; font-weight: bold; }
        .col-result { width: 85px;  text-align: center; font-weight: 900; color: #2563eb; }
        .col-edit   { width: 25px;  text-align: center; color: #cbd5e1; }
        .flag-icon { width: 18px; height: 12px; margin-right: 4px; border: 1px solid #eee; flex-shrink: 0; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1e3a8a; display: flex; padding: 15px; z-index: 50; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        .nav-item { color: white; text-align: center; font-size: 16px; font-weight: bold; flex: 1; }
    </style>
</head>
<body>

    <div id="result-tab" class="tab-content active"><div id="result-list">読み込み中...</div></div>
    <div id="player-tab" class="tab-content"><div id="player-list">読み込み中...</div></div>

    <nav class="bottom-nav">
        <button onclick="showTab('result-tab')" class="nav-item">Result</button>
        <button onclick="showTab('player-tab')" class="nav-item border-l border-blue-800">Player</button>
    </nav>

    <!-- 編集モーダル -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 z-[100]">
        <div class="bg-white p-6 rounded-2xl w-full max-sm shadow-2xl">
            <h2 id="modal-team-name" class="text-xl font-bold mb-6 text-blue-900 text-center">Update</h2>
            <div class="space-y-4">
                <div class="flex justify-between items-center"><label class="font-bold">Win</label><input type="number" id="edit-win" class="border-2 rounded-lg w-24 p-2 text-center text-lg font-bold bg-gray-50"></div>
                <div class="flex justify-between items-center"><label class="font-bold">Draw</label><input type="number" id="edit-draw" class="border-2 rounded-lg w-24 p-2 text-center text-lg font-bold bg-gray-50"></div>
                <div class="flex justify-between items-center"><label class="font-bold">Lose</label><input type="number" id="edit-lose" class="border-2 rounded-lg w-24 p-2 text-center text-lg font-bold bg-gray-50"></div>
                <div class="flex flex-col gap-1">
                    <label class="font-bold">Result</label>
                    <select id="edit-result-status" class="border-2 rounded-lg w-full p-3 bg-gray-50 font-bold">
                        <option value="-">-</option>
                        <option value="GS敗退">GS敗退</option>
                        <option value="ベスト32">ベスト32</option>
                        <option value="ベスト16">ベスト16</option>
                        <option value="ベスト8">ベスト8</option>
                        <option value="4位">4位</option>
                        <option value="3位">3位</option>
                        <option value="準優勝">準優勝</option>
                        <option value="優勝">優勝</option>
                    </select>
                </div>
                <div class="pt-4 flex gap-3">
                    <button onclick="submitUpdate()" id="save-btn" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold">Save</button>
                    <button onclick="closeModal()" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-xl font-bold">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 【重要】新しいGAS URLに書き換えてください
        const API_URL = "https://script.google.com/macros/s/AKfycbxKY1FwrajSsVmJIMI3fSQomSDp6oFyIciQ4uEPHWhn6MTxZld062u5FcNkJsOdSD9Q/exec";

        const flagMap = { "日本": "jp", "アルゼンチン": "ar", "フランス": "fr", "スペイン": "es", "ドイツ": "de", "ブラジル": "br", "イングランド": "gb", "モロッコ": "ma", "イタリア": "it", "アメリカ": "us", "メキシコ": "mx", "mexico": "mx", "カナダ": "ca" };

        let currentData = null;

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                currentData = await res.json();
                renderResult(currentData.result);
                renderPlayers(currentData.players);
            } catch (e) { console.error(e); }
        }

        function renderResult(data) {
            const container = document.getElementById('result-list');
            const groups = data.reduce((acc, row) => {
                const g = row.Group || "-";
                if (!acc[g]) acc[g] = [];
                acc[g].push(row);
                return acc;
            }, {});

            container.innerHTML = Object.keys(groups).sort().map(groupName => `
                <div class="mb-4">
                    <div class="bg-blue-900 text-white p-2 px-4 font-bold text-[10px]">GROUP ${groupName}</div>
                    <div class="row-container header-row">
                        <div class="col-team">TEAM</div><div class="col-player">PLAYER</div><div class="col-val">WIN</div><div class="col-val">DRAW</div><div class="col-val">LOSE</div><div class="col-result">RESULT</div><div class="col-edit"></div>
                    </div>
                    ${groups[groupName].map(row => `
                        <div class="row-container" onclick="openModal('${row.Team}', ${row.Win || 0}, ${row.Draw || 0}, ${row.Lose || 0}, '${row.Result || '-'}')">
                            <div class="col-team">
                                <img src="https://flagcdn.com/w40/${flagMap[row.Team.toString().toLowerCase().trim()] || 'un'}.png" class="flag-icon">
                                <span class="truncate">${row.Team}</span>
                            </div>
                            <div class="col-player truncate">${row.Player || '-'}</div>
                            <div class="col-val">${row.Win || 0}</div>
                            <div class="col-val">${row.Draw || 0}</div>
                            <div class="col-val">${row.Lose || 0}</div>
                            <div class="col-result truncate">${row.Result || '-'}</div>
                            <div class="col-edit text-[10px]">✎</div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        function renderPlayers(data) {
            const container = document.getElementById('player-list');
            const players = data.reduce((acc, row) => {
                const p = row.Player || "Unknown";
                const total = row["Total Points"] || row["TotalPoints"] || 0;
                if (!acc[p]) acc[p] = { teams: [], total: total };
                acc[p].teams.push(row);
                return acc;
            }, {});

            container.innerHTML = Object.entries(players).map(([name, info]) => `
                <div class="mb-6 bg-white shadow-sm overflow-hidden">
                    <div class="bg-gray-800 text-white p-4 flex justify-between items-center px-4">
                        <span class="text-lg font-bold">${name}</span>
                        <div class="text-right"><span class="text-[10px] block text-gray-400">TOTAL</span><span class="text-2xl font-black text-yellow-400">${info.total}</span></div>
                    </div>
                    ${info.teams.map(t => `
                        <div class="flex p-3 border-b text-sm items-center">
                            <div class="flex-1 flex items-center font-bold">
                                <img src="https://flagcdn.com/w40/${flagMap[t.Team.toString().toLowerCase().trim()] || 'un'}.png" class="flag-icon">
                                <span>${t.Team}</span>
                            </div>
                            <div class="flex-1 text-center text-gray-600 text-xs">${t.Result || '-'}</div>
                            <div class="flex-1 text-right font-bold text-blue-600">${t.Points || 0} pt</div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        let editingTeam = "";
        function openModal(team, win, draw, lose, status) {
            editingTeam = team;
            document.getElementById('modal-team-name').innerText = team;
            document.getElementById('edit-win').value = win;
            document.getElementById('edit-draw').value = draw;
            document.getElementById('edit-lose').value = lose;
            document.getElementById('edit-result-status').value = status;
            document.getElementById('edit-modal').classList.remove('hidden');
            const btn = document.getElementById('save-btn');
            btn.innerText = "Save"; btn.disabled = false;
        }

        function closeModal() { document.getElementById('edit-modal').classList.add('hidden'); }

        async function submitUpdate() {
            const btn = document.getElementById('save-btn');
            const payload = {
                team: editingTeam,
                win: parseInt(document.getElementById('edit-win').value) || 0,
                draw: parseInt(document.getElementById('edit-draw').value) || 0,
                lose: parseInt(document.getElementById('edit-lose').value) || 0,
                resultStatus: document.getElementById('edit-result-status').value
            };
            btn.innerText = "Saving..."; btn.disabled = true;
            try {
                await fetch(API_URL, { method: "POST", mode: 'no-cors', body: JSON.stringify(payload) });
                setTimeout(async () => { await loadData(); closeModal(); }, 1200);
            } catch (e) { alert("Error!"); btn.innerText = "Save"; btn.disabled = false; }
        }
        loadData();
    </script>
</body>
</html>
