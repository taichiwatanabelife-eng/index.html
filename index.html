<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WC2026 Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000000; color: #ffffff; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; padding-bottom: 140px; }
        .active-content { display: block; }
        
        /* 下部メニュー：横スクロール可能 */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #171717; display: flex; overflow-x: auto; padding: 12px 6px; z-index: 50; border-top: 1px solid #262626; padding-bottom: calc(12px + env(safe-area-inset-bottom)); scrollbar-width: none; }
        .bottom-nav::-webkit-scrollbar { display: none; }
        .nav-item { color: #737373; text-align: center; font-size: 12px; font-weight: bold; flex-shrink: 0; padding: 8px 16px; border-radius: 20px; transition: all 0.2s; margin: 0 4px; }
        .nav-item.active-tab { background: #ffffff; color: #000000; }

        /* GS表示 */
        .row-container { display: flex; align-items: center; width: 100%; background: #111; border-bottom: 1px solid #222; padding: 14px 2px; white-space: nowrap; font-size: 11px; }
        .col-team   { width: 115px; display: flex; align-items: center; font-weight: 900; padding-left: 6px; }
        .col-player { width: 75px; color: #525252; overflow: hidden; text-overflow: ellipsis; }
        .col-val    { width: 34px; text-align: center; font-weight: bold; }
        .col-result { width: 105px; text-align: center; font-weight: 900; color: #3b82f6; }
        .val-zero   { color: #333; }
        .flag-icon { width: 20px; height: 14px; margin-right: 6px; border: 1px solid #333; flex-shrink: 0; }

        /* トーナメント表示 */
        .match-card { background: #111; border: 1px solid #262626; border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
        .owner-ebi { border-left: 4px solid #ef4444 !important; }
        .owner-gatchi { border-left: 4px solid #3b82f6 !important; }
        .owner-taichi { border-left: 4px solid #10b981 !important; }
        .winner-row { background: #262626 !important; }
        .winner-row .team-text { color: #fbbf24 !important; font-weight: 900; }

        /* プレイヤー折りたたみ */
        .player-detail { display: none; }
        .player-detail.open { display: block; }

        /* モーダル */
        .modal-bg { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px); }
        input, select { background: #262626 !important; border: 1px solid #404040 !important; color: white !important; outline: none; }
    </style>
</head>
<body>

    <!-- 画面ユニット（ご要望の順序） -->
    <div id="player-tab" class="tab-content active-content"><div id="player-list"></div></div>
    <div id="rules-tab" class="tab-content"><div id="rules-list"></div></div>
    <div id="gs-tab" class="tab-content"><div id="gs-list"></div></div>
    <div id="r32-tab" class="tab-content"><div id="r32-list" class="p-4"></div></div>
    <div id="r16-tab" class="tab-content"><div id="r16-list" class="p-4"></div></div>
    <div id="qf-tab" class="tab-content"><div id="qf-list" class="p-4"></div></div>
    <div id="sf-tab" class="tab-content"><div id="sf-list" class="p-4"></div></div>
    <div id="final-tab" class="tab-content"><div id="final-list" class="p-4"></div></div>

    <!-- ナビゲーション -->
    <nav class="bottom-nav">
        <button id="btn-player" onclick="showTab('player-tab')" class="nav-item active-tab">Player</button>
        <button id="btn-rules" onclick="showTab('rules-tab')" class="nav-item">Rules</button>
        <button id="btn-gs" onclick="showTab('gs-tab')" class="nav-item">GS</button>
        <button id="btn-r32" onclick="showTab('r32-tab')" class="nav-item">R32</button>
        <button id="btn-r16" onclick="showTab('r16-tab')" class="nav-item">R16</button>
        <button id="btn-qf" onclick="showTab('qf-tab')" class="nav-item">QF</button>
        <button id="btn-sf" onclick="showTab('sf-tab')" class="nav-item">SF</button>
        <button id="btn-final" onclick="showTab('final-tab')" class="nav-item">Final</button>
    </nav>

    <!-- モーダル -->
    <div id="edit-modal" class="hidden fixed inset-0 modal-bg flex items-center justify-center p-4 z-[100]">
        <div class="bg-[#171717] p-6 rounded-2xl w-full max-w-sm shadow-2xl border border-neutral-800">
            <h2 id="modal-team-name" class="text-xl font-bold mb-6 text-white text-center">Update Status</h2>
            <div id="modal-gs-fields" class="space-y-4 text-sm mb-4">
                <div class="flex justify-between items-center"><label class="text-neutral-400">Win</label><input type="number" id="edit-win" class="rounded-lg w-20 p-2 text-center font-bold"></div>
                <div class="flex justify-between items-center"><label class="text-neutral-400">Draw</label><input type="number" id="edit-draw" class="rounded-lg w-20 p-2 text-center font-bold"></div>
                <div class="flex justify-between items-center"><label class="text-neutral-400">Lose</label><input type="number" id="edit-lose" class="rounded-lg w-20 p-2 text-center font-bold"></div>
            </div>
            <div class="flex flex-col gap-1 mb-6">
                <label class="text-neutral-400 text-sm">Result Status</label>
                <select id="edit-result-status" class="rounded-lg w-full p-3 font-bold">
                    <option value="">-</option><option value="GS敗退">GS敗退</option><option value="ベスト32">ベスト32</option>
                    <option value="ベスト16">ベスト16</option><option value="ベスト8">ベスト8</option><option value="4位">4位</option>
                    <option value="3位">3位</option><option value="準優勝">準優勝</option><option value="優勝">優勝</option>
                </select>
            </div>
            <div class="flex gap-3">
                <button onclick="submitUpdate()" id="save-btn" class="flex-1 bg-white text-black py-3 rounded-xl font-bold">Save</button>
                <button onclick="closeModal()" class="flex-1 bg-neutral-800 text-white py-3 rounded-xl font-bold">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyNG9kLk837e5hbvoC_G2ten_HyPID0Znp3_atCkieLVkP8FrGit5skyaSbjHnyBw3S/exec";
        
        const flagMap = { "日本": "jp", "韓国": "kr", "中国": "cn", "オーストラリア": "au", "サウジアラビア": "sa", "イラン": "ir", "カタール": "qa", "フランス": "fr", "スペイン": "es", "ドイツ": "de", "イタリア": "it", "イングランド": "gb", "ポルトガル": "pt", "オランダ": "nl", "クロアチア": "hr", "アメリカ": "us", "メキシコ": "mx", "mexico": "mx", "カナダ": "ca", "アルゼンチン": "ar", "ブラジル": "br", "ウルグアイ": "uy", "コロンビア": "co", "モロッコ": "ma", "セネガル": "sn", "ハイチ": "ht", "キュラソー": "cw", "カーボベルデ": "cv", "コンゴ": "cg", "ボスニア・ヘルツェゴヴィナ": "ba", "チェコ": "cz", "南アフリカ": "za", "パラグアイ": "py", "スウェーデン": "se", "オーストリア": "at", "ノルウェー": "no", "エクアドル": "ec", "アルジェリア": "dz", "ガーナ": "gh", "エジプト": "eg", "コートジボワール": "ci" };
        const ownerClasses = { "えび": "owner-ebi", "がっち": "owner-gatchi", "たいち": "owner-taichi" };

        const bracket32Order = ["南アフリカ", "カナダ", "オランダ", "モロッコ", "ドイツ", "パラグアイ", "フランス", "スウェーデン", "ベルギー", "セネガル", "アメリカ", "ボスニア・ヘルツェゴヴィナ", "スペイン", "オーストリア", "ポルトガル", "クロアチア", "ブラジル", "日本", "コートジボワール", "ノルウェー", "メキシコ", "エクアドル", "イングランド", "コンゴ", "スイス", "アルジェリア", "コロンビア", "ガーナ", "オーストラリア", "エジプト", "アルゼンチン", "カーボベルデ"];

        let db = { result: [], players: [], rules: [] };
        let tournament = { 32: [], 16: Array(8).fill(null).map(()=>({teams:[null,null], winner:null})), 8: Array(4).fill(null).map(()=>({teams:[null,null], winner:null})), 4: Array(2).fill(null).map(()=>({teams:[null,null], winner:null})), 2: Array(1).fill(null).map(()=>({teams:[null,null], winner:null})) };
        let activeTabId = 'player-tab';

        async function loadData(keepTab = true) {
            try {
                const res = await fetch(API_URL);
                db = await res.json();
                renderAll();
                if (!keepTab) showTab('player-tab');
            } catch (e) { console.error(e); }
        }

        function renderAll() {
            renderGS();
            initTournament();
            renderPlayers();
            renderRules();
        }

        function renderGS() {
            const container = document.getElementById('gs-list');
            container.innerHTML = "";
            const groups = db.result.reduce((acc, row) => {
                const g = row.Group || "-";
                if (!acc[g]) acc[g] = [];
                const w = parseInt(row.Win) || 0;
                const d = parseInt(row.Draw) || 0;
                acc[g].push({ ...row, pts: w*3+d });
                return acc;
            }, {});

            Object.keys(groups).sort().forEach(gName => {
                const sorted = groups[gName].sort((a,b) => b.pts - a.pts);
                let html = `<div class="mb-4"><div class="bg-neutral-800 text-neutral-500 p-2 px-4 font-bold text-[10px] tracking-widest uppercase">GROUP ${gName}</div><div class="row-container bg-neutral-900 text-[9px] font-bold text-neutral-600 border-b border-neutral-800"><div class="col-team">TEAM</div><div class="col-player">PLAYER</div><div class="col-val">W</div><div class="col-val">D</div><div class="col-val">L</div><div class="col-result">RESULT</div></div>`;
                sorted.forEach(row => {
                    html += `<div class="row-container" onclick="openEditModal('${row.Team}', true)">
                        <div class="col-team"><img src="https://flagcdn.com/w40/${flagMap[row.Team] || 'un'}.png" class="flag-icon"><span>${row.Team}</span></div>
                        <div class="col-player">${row.Player || '-'}</div>
                        <div class="col-val ${row.Win > 0 ? '' : 'val-zero'}">${row.Win || 0}</div>
                        <div class="col-val ${row.Draw > 0 ? '' : 'val-zero'}">${row.Draw || 0}</div>
                        <div class="col-val ${row.Lose > 0 ? '' : 'val-zero'}">${row.Lose || 0}</div>
                        <div class="col-result truncate">${row.Result || '-'}</div>
                    </div>`;
                });
                container.innerHTML += html + `</div>`;
            });
        }

        function initTournament() {
            tournament[32] = [];
            for (let i = 0; i < 16; i++) {
                const t1Name = bracket32Order[i*2];
                const t2Name = bracket32Order[i*2+1];
                const t1 = db.result.find(d => d.Team === t1Name);
                const t2 = db.result.find(d => d.Team === t2Name);
                tournament[32].push({
                    winner: null,
                    teams: [
                        t1 ? { name: t1.Team, owner: t1.Player, flag: flagMap[t1.Team] || "un" } : null,
                        t2 ? { name: t2.Team, owner: t2.Player, flag: flagMap[t2.Team] || "un" } : null
                    ]
                });
            }
            [32, 16, 8, 4, 2].forEach(r => renderBracket(r));
        }

        function renderBracket(round) {
            const listId = `${round === 32 ? 'r32' : round === 16 ? 'r16' : round === 8 ? 'qf' : round === 4 ? 'sf' : 'final'}-list`;
            const container = document.getElementById(listId);
            container.innerHTML = "";
            tournament[round].forEach((match, mIdx) => {
                let html = `<div class="match-card">`;
                match.teams.forEach((team, tIdx) => {
                    const ownerClass = team ? (ownerClasses[team.owner] || "") : "";
                    html += `<div onclick="handleTournamentClick(${round}, ${mIdx}, ${tIdx}, '${team?team.name:''}')" class="flex items-center justify-between p-3.5 transition-all ${ownerClass} ${match.winner === tIdx ? 'winner-row' : ''}">
                        <div class="flex items-center space-x-3 flex-1">
                            <img src="h
