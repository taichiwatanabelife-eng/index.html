<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORLDCUP 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .flag-icon { width: 18px; height: 12px; object-fit: cover; margin-right: 4px; border: 1px solid #ddd; flex-shrink: 0; }
        .tab-content { display: none; padding-bottom: 100px; }
        .active { display: block; }
        
        /* 下部ナビゲーション */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1e3a8a; display: flex; justify-content: space-around; padding: 15px; z-index: 50; }
        .nav-item { color: white; text-align: center; font-size: 16px; font-weight: bold; flex: 1; }

        /* --- 横並びを強制する設定 --- */
        .scroll-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        
        /* Resultシート用：1行を最低 500px の幅に固定して横並びを死守 */
        .res-grid-row {
            display: grid;
            grid-template-cols: 140px 100px 60px 60px 60px 100px 30px;
            min-width: 550px;
            align-items: center;
            text-align: center;
            font-size: 12px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 0;
        }
        .grid-header { background: #f1f5f9; font-weight: bold; color: #475569; position: sticky; top: 0; }

        /* Playerシート用：最低 350px の幅で横並び */
        .ply-grid-row {
            display: grid;
            grid-template-cols: 140px 120px 80px;
            min-width: 340px;
            align-items: center;
            padding: 12px 10px;
            background: white;
            border-bottom: 1px solid #f1f5f9;
            font-size: 13px;
        }
        .ply-header { background: #f8fafc; font-weight: bold; color: #64748b; font-size: 11px; }

        .team-cell { text-align: left; display: flex; align-items: center; font-weight: bold; padding-left: 10px; }
        .player-cell { text-align: left; color: #64748b; }
    </style>
</head>
<body class="bg-gray-100">

    <!-- Resultタブ -->
    <div id="result-tab" class="tab-content active">
        <div id="result-list">読み込み中...</div>
    </div>

    <!-- Playerタブ -->
    <div id="player-tab" class="tab-content">
        <div id="player-list">読み込み中...</div>
    </div>

    <!-- 下部メニュー -->
    <nav class="bottom-nav">
        <button onclick="showTab('result-tab')" class="nav-item">Result</button>
        <button onclick="showTab('player-tab')" class="nav-item border-l border-blue-700">Player</button>
    </nav>

    <!-- 編集モーダル -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 z-[100]">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm shadow-2xl">
            <h2 id="modal-team-name" class="text-xl font-bold mb-6 text-blue-900 text-center">数値を入力</h2>
            <div class="space-y-4">
                <div class="flex justify-between items-center"><label class="font-bold">Win</label><input type="number" id="edit-win" class="border-2 rounded-lg w-24 p-2 text-center"></div>
                <div class="flex justify-between items-center"><label class="font-bold">Draw</label><input type="number" id="edit-draw" class="border-2 rounded-lg w-24 p-2 text-center"></div>
                <div class="flex justify-between items-center"><label class="font-bold">Lose</label><input type="number" id="edit-lose" class="border-2 rounded-lg w-24 p-2 text-center"></div>
                <div class="flex flex-col gap-1">
                    <label class="font-bold">Result</label>
                    <select id="edit-result-status" class="border-2 rounded-lg w-full p-2 bg-gray-50">
                        <option value="GS敗退">GS敗退</option>
                        <option value="Best 32">Best 32</option>
                        <option value="Best 16">Best 16</option>
                        <option value="Best 8">Best 8</option>
                        <option value="準決勝">準決勝</option>
                        <option value="準優勝">準優勝</option>
                        <option value="優勝">優勝</option>
                    </select>
                </div>
                <div class="pt-4 flex gap-2">
                    <button onclick="submitUpdate()" id="save-btn" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold">Save</button>
                    <button onclick="closeModal()" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-xl font-bold">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxjOJLiIpiE58ivDd472FYPD6A7uYWdPs0iN4-PSIHj7VujnyH-2LwbRrzjiuuuyc0/exec";

        const flagMap = {
            "日本": "jp", "アルゼンチン": "ar", "フランス": "fr", "スペイン": "es", "ドイツ": "de", "ブラジル": "br", "イングランド": "gb", "モロッコ": "ma",
            "アメリカ": "us", "メキシコ": "mx", "カナダ": "ca", "イタリア": "it"
        };

        let currentData = null;

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                currentData = await res.json();
                renderResult(currentData.result);
                renderPlayers(currentData.players);
            } catch (e) { console.error(e); }
        }

        function renderResult(data) {
            const container = document.getElementById('result-list');
            const groups = data.reduce((acc, row) => {
                if (!acc[row.Group]) acc[row.Group] = [];
                acc[row.Group].push(row);
                return acc;
            }, {});

            container.innerHTML = Object.keys(groups).sort().map(groupName => `
                <div class="mb-4 bg-white shadow-sm">
                    <div class="bg-blue-900 text-white p-2 px-4 font-bold text-sm">Group ${groupName}</div>
                    <div class="scroll-container">
                        <div class="res-grid-row grid-header">
                            <div class="text-left pl-[10px]">Team</div>
                            <div class="text-left">Player</div>
                            <div>Win</div>
                            <div>Draw</div>
                            <div>Lose</div>
                            <div>Result</div>
                            <div></div>
                        </div>
                        ${groups[groupName].map(row => `
