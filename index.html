<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORLDCUP 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .flag-icon { width: 20px; height: 14px; object-fit: cover; margin-right: 6px; border: 1px solid #ddd; }
        .tab-content { display: none; padding-bottom: 100px; }
        .active { display: block; }
        
        /* 下部ナビゲーション */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1e3a8a; display: flex; justify-content: space-around; padding: 15px; z-index: 50; }
        .nav-item { color: white; text-align: center; font-size: 16px; font-weight: bold; flex: 1; }

        /* Result用：横並びレイアウト（Team, Player, Win, Draw, Lose, Result） */
        .res-grid { 
            display: grid; 
            grid-template-cols: 2.5fr 1.5fr 1fr 1fr 1fr 1.8fr; 
            gap: 4px; 
            align-items: center; 
            text-align: center;
            font-size: 12px;
        }
        .grid-header { background: #f8fafc; color: #475569; font-weight: bold; padding: 10px 8px; border-bottom: 2px solid #e2e8f0; }
        .grid-row { background: white; padding: 14px 8px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
        .team-cell { text-align: left; display: flex; align-items: center; font-weight: bold; overflow: hidden; }

        /* Player用：横並びレイアウト（Team, Result, Points） */
        .ply-grid {
            display: grid;
            grid-template-cols: 3fr 3fr 2fr;
            gap: 8px;
            align-items: center;
            padding: 10px 12px;
        }
    </style>
</head>
<body class="bg-gray-100">

    <!-- Resultタブ -->
    <div id="result-tab" class="tab-content active">
        <div id="result-list">読み込み中...</div>
    </div>

    <!-- Playerタブ -->
    <div id="player-tab" class="tab-content">
        <div id="player-list">読み込み中...</div>
    </div>

    <!-- 下部メニュー -->
    <nav class="bottom-nav">
        <button onclick="showTab('result-tab')" class="nav-item">Result</button>
        <button onclick="showTab('player-tab')" class="nav-item border-l border-blue-700">Player</button>
    </nav>

    <!-- 編集モーダル -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 z-[100]">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm shadow-2xl">
            <h2 id="modal-team-name" class="text-xl font-bold mb-6 text-blue-900 text-center">Edit Team Stats</h2>
            <div class="space-y-4">
                <div class="flex justify-between items-center"><label class="font-bold">Win</label><input type="number" id="edit-win" class="border-2 rounded-lg w-24 p-2 text-center text-lg"></div>
                <div class="flex justify-between items-center"><label class="font-bold">Draw</label><input type="number" id="edit-draw" class="border-2 rounded-lg w-24 p-2 text-center text-lg"></div>
                <div class="flex justify-between items-center"><label class="font-bold">Lose</label><input type="number" id="edit-lose" class="border-2 rounded-lg w-24 p-2 text-center text-lg"></div>
                <div class="flex flex-col gap-2">
                    <label class="font-bold">Result</label>
                    <select id="edit-result-status" class="border-2 rounded-lg w-full p-3 bg-gray-50">
                        <option value="GS敗退">GS敗退</option>
                        <option value="Best 16">Best 16</option>
                        <option value="Best 8">Best 8</option>
                        <option value="準決勝">準決勝</option>
                        <option value="準優勝">準優勝</option>
                        <option value="優勝">優勝</option>
                    </select>
                </div>
                <div class="pt-6 flex gap-3">
                    <button onclick="submitUpdate()" id="save-btn" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg active:scale-95 transition-transform">Save</button>
                    <button onclick="closeModal()" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-xl font-bold">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxjOJLiIpiE58ivDd472FYPD6A7uYWdPs0iN4-PSIHj7VujnyH-2LwbRrzjiuuuyc0/exec";

        const flagMap = {
            "日本": "jp", "アルゼンチン": "ar", "フランス": "fr", "スペイン": "es", 
            "ドイツ": "de", "ブラジル": "br", "イングランド": "gb", "モロッコ": "ma",
            "イタリア": "it", "クロアチア": "hr", "アメリカ": "us", "メキシコ": "mx"
        };

        let currentData = null;

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                currentData = await res.json();
                renderResult(currentData.result);
                renderPlayers(currentData.players);
            } catch (e) { console.error("Load Error:", e); }
        }

        function renderResult(data) {
            const container = document.getElementById('result-list');
            const groups = data.reduce((acc, row) => {
                const g = row.Group || "-";
                if (!acc[g]) acc[g] = [];
                acc[g].push(row);
                return acc;
            }, {});

            container.innerHTML = Object.keys(groups).sort().map(groupName => `
                <div class="mb-6 bg-white shadow-sm overflow-hidden">
                    <div class="bg-blue-900 text-white p-3 px-4 font-bold">Group ${groupName}</div>
                    <!-- ヘッダー：Team, Playerの文字を消し、Win, Draw, Lose, Resultを配置 -->
                    <div class="res-grid grid-header">
                        <div></div><div></div><div>Win</div><div>Draw</div><div>Lose</div><div>Result</div>
                    </div>
                    ${groups[groupName].map(row => `
                        <div class="res-grid grid-row" onclick="openModal('${row.Team}', ${row.Win || 0}, ${row.Draw || 0}, ${row.Lose || 0}, '${row.Result || 'GS敗退'}')">
                            <div class="team-cell">
                                <img src="https://flagcdn.com/w40/${flagMap[row.Team] || 'un'}.png" class="flag-icon">
                                <span class="truncate">${row.Team}</span>
                            </div>
                            <div class="text-gray-400 truncate text-left">${row.Player || '-'}</div>
                            <div class="font-medium">${row.Win || 0}</div>
                            <div class="font-medium">${row.Draw || 0}</div>
                            <div class="font-medium">${row.Lose || 0}</div>
                            <div class="text-blue-600 font-bold">${row.Result || '-'}</div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        function renderPlayers(data) {
            const container = document.getElementById('player-list');
            const players = data.reduce((acc, row) => {
                const p = row.Player || "Unknown";
                if (!acc[p]) acc[p] = { teams: [], total: row["Total Points"] || 0 };
                acc[p].teams.push(row);
                return acc;
            }, {});

            container.innerHTML = Object.entries(players).map(([name, info]) => `
                <div class="mb-6 bg-white shadow-md rounded-lg overflow-hidden mx-2 mt-4">
                    <div class="bg-gray-800 text-white p-4 flex justify-between items-center">
                        <span class="text-xl font-black">${name}</span>
                        <div class="text-right">
                            <span class="text-[10px] block uppercase text-gray-400">Total Points</span>
                            <span class="text-2xl font-black text-yellow-400">${info.total}</span>
                        </div>
                    </div>
                    <!-- Playerヘッダー：横並び -->
                    <div class="ply-grid bg-gray-50 text-[11px] font-bold text-gray-500 border-b">
                        <div>Team</div><div>Result</div><div class="text-right">Points</div>
                    </div>
                    ${info.teams.map(t => `
                        <div class="ply-grid border-b last:border-0 text-sm">
                            <div class="flex items-center font-bold">
                                <img src="https://flagcdn.com/w40/${flagMap[t.Team] || 'un'}.png" class="flag-icon">
                                <span>${t.Team}</span>
                            </div>
                            <div class="text-gray-600">${t.Result || '-'}</div>
                            <div class="font-black text-right text-blue-700">${t.Points || 0} pt</div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        let editingTeam = "";
        function openModal(team, win, draw, lose, status) {
            editingTeam = team;
            document.getElementById('modal-team-name').innerText = team;
            document.getElementById('edit-win').value = win;
            document.getElementById('edit-draw').value = draw;
            document.getElementById('edit-lose').value = lose;
            document.getElementById('edit-result-status').value = status;
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('edit-modal').classList.add('hidden'); }

        async function submitUpdate() {
            const btn = document.getElementById('save-btn');
            const payload = {
                team: editingTeam,
                win: parseInt(document.getElementById('edit-win').value) || 0,
                draw: parseInt(document.getElementById('edit-draw').value) || 0,
                lose: parseInt(document.getElementById('edit-lose').value) || 0,
                resultStatus: document.getElementById('edit-result-status').value
            };

            btn.innerText = "Saving...";
            btn.disabled = true;

            try {
                // GASへの送信
                await fetch(API_URL, {
                    method: "POST",
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });

                // 反映まで少し待って再読込
                setTimeout(() => {
                    closeModal();
                    loadData();
                    btn.innerText = "Save";
                    btn.disabled = false;
                }, 1500);
            } catch (e) {
                alert("Error saving data");
                btn.disabled = false;
            }
        }

        loadData();
    </script>
</body>
</html>
