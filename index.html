<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WORLDCUP 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ダークテーマの基本設定 */
        body { font-family: -apple-system, sans-serif; background: #0a0a0a; color: #ffffff; }
        .tab-content { display: none; padding-bottom: 120px; }
        .active-content { display: block; }
        
        /* 表のデザイン（ダーク） */
        .row-container { display: flex; align-items: center; width: 100%; background: #171717; border-bottom: 1px solid #262626; padding: 14px 4px; white-space: nowrap; font-size: 11px; cursor: pointer; }
        .header-row { background: #262626; font-weight: bold; color: #a3a3a3; font-size: 10px; cursor: default; position: sticky; top: 0; z-index: 10; }
        
        /* 列の幅固定 */
        .col-team   { width: 105px; display: flex; align-items: center; font-weight: 800; overflow: hidden; padding-left: 4px; }
        .col-player { width: 70px;  color: #737373; overflow: hidden; text-overflow: ellipsis; }
        .col-val    { width: 32px;  text-align: center; font-weight: bold; }
        .col-result { width: 85px;  text-align: center; font-weight: 900; color: #3b82f6; }
        .col-edit   { width: 25px;  text-align: center; color: #404040; }
        .flag-icon { width: 18px; height: 12px; margin-right: 6px; border: 1px solid #404040; flex-shrink: 0; }

        /* ナビゲーション */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #171717; display: flex; padding: 12px; z-index: 50; border-top: 1px solid #262626; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
        .nav-item { color: #a3a3a3; text-align: center; font-size: 14px; font-weight: bold; flex: 1; padding: 10px; border-radius: 8px; transition: all 0.2s; }
        .nav-item.active-tab { background: #ffffff; color: #000000; }

        /* モーダル */
        .modal-bg { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(4px); }
        .modal-content { background: #171717; border: 1px solid #262626; }
        input, select { background: #262626 !important; border: 1px solid #404040 !important; color: white !important; }
    </style>
</head>
<body>

    <div id="result-tab" class="tab-content active-content"><div id="result-list"></div></div>
    <div id="player-tab" class="tab-content"><div id="player-list"></div></div>

    <nav class="bottom-nav">
        <button id="btn-result" onclick="showTab('result-tab')" class="nav-item active-tab">Result</button>
        <button id="btn-player" onclick="showTab('player-tab')" class="nav-item">Player</button>
    </nav>

    <!-- 編集モーダル -->
    <div id="edit-modal" class="hidden fixed inset-0 modal-bg flex items-center justify-center p-4 z-[100]">
        <div class="modal-content p-6 rounded-2xl w-full max-w-sm shadow-2xl">
            <h2 id="modal-team-name" class="text-xl font-bold mb-6 text-white text-center tracking-tight">Update Stats</h2>
            <div class="space-y-4 text-sm">
                <div class="flex justify-between items-center"><label class="font-bold text-neutral-400">Win</label><input type="number" id="edit-win" class="rounded-lg w-24 p-2 text-center text-lg font-bold"></div>
                <div class="flex justify-between items-center"><label class="font-bold text-neutral-400">Draw</label><input type="number" id="edit-draw" class="rounded-lg w-24 p-2 text-center text-lg font-bold"></div>
                <div class="flex justify-between items-center"><label class="font-bold text-neutral-400">Lose</label><input type="number" id="edit-lose" class="rounded-lg w-24 p-2 text-center text-lg font-bold"></div>
                <div class="flex flex-col gap-1">
                    <label class="font-bold text-neutral-400">Result Status</label>
                    <select id="edit-result-status" class="rounded-lg w-full p-3 font-bold">
                        <option value="">-</option>
                        <option value="GS敗退">GS敗退</option>
                        <option value="ベスト32">ベスト32</option>
                        <option value="ベスト16">ベスト16</option>
                        <option value="ベスト8">ベスト8</option>
                        <option value="4位">4位</option>
                        <option value="3位">3位</option>
                        <option value="準優勝">準優勝</option>
                        <option value="優勝">優勝</option>
                    </select>
                </div>
                <div class="pt-4 flex gap-3">
                    <button onclick="submitUpdate()" id="save-btn" class="flex-1 bg-white text-black py-3 rounded-xl font-bold active:scale-95 transition-transform">Save</button>
                    <button onclick="closeModal()" class="flex-1 bg-neutral-800 text-white py-3 rounded-xl font-bold">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxKY1FwrajSsVmJIMI3fSQomSDp6oFyIciQ4uEPHWhn6MTxZld062u5FcNkJsOdSD9Q/exec";

        const flagMap = { "日本": "jp", "アルゼンチン": "ar", "フランス": "fr", "スペイン": "es", "ドイツ": "de", "ブラジル": "br", "イングランド": "gb", "モロッコ": "ma", "イタリア": "it", "アメリカ": "us", "メキシコ": "mx", "mexico": "mx", "カナダ": "ca" };

        let resultData = [];

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                resultData = data.result;
                renderResult(resultData);
                renderPlayers(data.players);
            } catch (e) { console.error(e); }
        }

        function renderResult(data) {
            const container = document.getElementById('result-list');
            container.innerHTML = ""; 
            const groups = data.reduce((acc, row, index) => {
                const g = row.Group || "-";
                if (!acc[g]) acc[g] = [];
                acc[g].push({ ...row, originalIndex: index });
                return acc;
            }, {});

            Object.keys(groups).sort().forEach(groupName => {
                let groupHtml = `
                    <div class="mb-4">
                        <div class="bg-neutral-800 text-neutral-400 p-2 px-4 font-bold text-[10px] tracking-widest">GROUP ${groupName}</div>
                        <div class="row-container header-row">
                            <div class="col-team">TEAM</div><div class="col-player">PLAYER</div><div class="col-val">WIN</div><div class="col-val">DRAW</div><div class="col-val">LOSE</div><div class="col-result">RESULT</div><div class="col-edit"></div>
                        </div>`;
                groups[groupName].forEach(row => {
                    const cleanTeam = row.Team.toString().toLowerCase().trim();
                    groupHtml += `
                        <div class="row-container" onclick="prepareEdit(${row.originalIndex})">
                            <div class="col-team">
                                <img src="https://flagcdn.com/w40/${flagMap[cleanTeam] || 'un'}.png" class="flag-icon">
                                <span class="truncate">${row.Team}</span>
                            </div>
                            <div class="col-player truncate">${row.Player || '-'}</div>
                            <div class="col-val">${row.Win || 0}</div>
                            <div class="col-val">${row.Draw || 0}</div>
                            <div class="col-val">${row.Lose || 0}</div>
                            <div class="col-result truncate">${row.Result || '-'}</div>
                            <div class="col-edit text-[10px]">✎</div>
                        </div>`;
                });
                container.innerHTML += groupHtml + `</div>`;
            });
        }

        function renderPlayers(data) {
            const container = document.getElementById('player-list');
            const players = data.reduce((acc, row) => {
                const p = row.Player || "Unknown";
                const total = row["Total Points"] || row["TotalPoints"] || 0;
                if (!acc[p]) acc[p] = { teams: [], total: total };
                acc[p].teams.push(row);
                return acc;
            }, {});

            container.innerHTML = Object.entries(players).map(([name, info]) => `
                <div class="mb-6 bg-neutral-900 border border-neutral-800 overflow-hidden shadow-xl">
                    <div class="bg-neutral-800 p-4 flex justify-between items-center px-4">
                        <span class="text-lg font-bold tracking-tight">${name}</span>
                        <div class="text-right"><span class="text-[9px] block text-neutral-500 font-bold tracking-tighter">TOTAL POINTS</span><span class="text-2xl font-black text-yellow-500">${info.total}</span></div>
                    </div>
                    ${info.teams.map(t => `
                        <div class="flex p-4 border-b border-neutral-800 text-sm items-center">
                            <div class="flex-1 flex items-center font-bold">
                                <img src="https://flagcdn.com/w40/${flagMap[t.Team.toString().toLowerCase().trim()] || 'un'}.png" class="flag-icon">
                                <span>${t.Team}</span>
                            </div>
                            <div class="flex-1 text-center text-neutral-400 text-xs">${t.Result || '-'}</div>
                            <div class="flex-1 text-right font-bold text-blue-500">${t.Points || 0} pt</div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active-content'));
            document.getElementById(tabId).classList.add('active-content');
            
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active-tab'));
            if(tabId === 'result-tab') document.getElementById('btn-result').classList.add('active-tab');
            else document.getElementById('btn-player').classList.add('active-tab');
        }

        let editingTeamName = "";
        function prepareEdit(index) {
            const row = resultData[index];
            editingTeamName = row.Team;
            document.getElementById('modal-team-name').innerText = row.Team;
            document.getElementById('edit-win').value = row.Win || 0;
            document.getElementById('edit-draw').value = row.Draw || 0;
            document.getElementById('edit-lose').value = row.Lose || 0;
            document.getElementById('edit-result-status').value = row.Result || "";
            document.getElementById('edit-modal').classList.remove('hidden');
            const btn = document.getElementById('save-btn');
            btn.innerText = "Save"; btn.disabled = false;
        }

        function closeModal() { document.getElementById('edit-modal').classList.add('hidden'); }

        async function submitUpdate() {
            const btn = document.getElementById('save-btn');
            const payload = {
                team: editingTeamName,
                win: parseInt(document.getElementById('edit-win').value) || 0,
                draw: parseInt(document.getElementById('edit-draw').value) || 0,
                lose: parseInt(document.getElementById('edit-lose').value) || 0,
                resultStatus: document.getElementById('edit-result-status').value
            };
            btn.innerText = "Saving..."; btn.disabled = true;
            try {
                // 送信
                await fetch(API_URL, { method: "POST", mode: 'no-cors', body: JSON.stringify(payload) });
                // 反映の安定性を高めるために待ち時間を2秒に延長
                setTimeout(async () => { 
                    await loadData(); 
                    closeModal(); 
                }, 2000);
            } catch (e) { alert("Error!"); btn.innerText = "Save"; btn.disabled = false; }
        }
        loadData();
    </script>
</body>
</html>
