<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WORLDCUP 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0a0a0a; color: #ffffff; }
        .tab-content { display: none; padding-bottom: 120px; }
        .active-content { display: block; }
        .row-container { display: flex; align-items: center; width: 100%; background: #171717; border-bottom: 1px solid #262626; padding: 14px 2px; white-space: nowrap; font-size: 11px; cursor: pointer; }
        .header-row { background: #262626; font-weight: bold; color: #a3a3a3; font-size: 10px; cursor: default; position: sticky; top: 0; z-index: 10; }
        .col-team   { width: 115px; display: flex; align-items: center; font-weight: 900; overflow: hidden; padding-left: 6px; }
        .col-player { width: 75px;  color: #737373; overflow: hidden; text-overflow: ellipsis; padding-left: 2px; }
        .col-val    { width: 34px;  text-align: center; font-weight: bold; }
        .col-result { width: 100px; text-align: center; font-weight: 900; color: #3b82f6; }
        .flag-icon { width: 20px; height: 14px; margin-right: 6px; border: 1px solid #404040; flex-shrink: 0; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #171717; display: flex; padding: 10px 6px; z-index: 50; border-top: 1px solid #262626; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .nav-item { color: #a3a3a3; text-align: center; font-size: 13px; font-weight: bold; flex: 1; padding: 10px 4px; border-radius: 8px; transition: all 0.2s; margin: 0 2px; }
        .nav-item.active-tab { background: #ffffff; color: #000000; }
        .modal-bg { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px); }
        .modal-content { background: #171717; border: 1px solid #262626; }
        input, select { background: #262626 !important; border: 1px solid #404040 !important; color: white !important; outline: none; }
    </style>
</head>
<body>

    <div id="result-tab" class="tab-content active-content"><div id="result-list"></div></div>
    <div id="player-tab" class="tab-content"><div id="player-list"></div></div>
    <div id="rules-tab" class="tab-content"><div id="rules-list"></div></div>

    <nav class="bottom-nav">
        <button id="btn-result" onclick="showTab('result-tab')" class="nav-item active-tab">Result</button>
        <button id="btn-player" onclick="showTab('player-tab')" class="nav-item">Player</button>
        <button id="btn-rules" onclick="showTab('rules-tab')" class="nav-item">Rules</button>
    </nav>

    <!-- 編集モーダル -->
    <div id="edit-modal" class="hidden fixed inset-0 modal-bg flex items-center justify-center p-4 z-[100]">
        <div class="modal-content p-6 rounded-2xl w-full max-w-sm shadow-2xl">
            <h2 id="modal-team-name" class="text-xl font-bold mb-6 text-white text-center">Update Stats</h2>
            <div class="space-y-4 text-sm">
                <div class="flex justify-between items-center"><label class="font-bold text-neutral-400">Win</label><input type="number" id="edit-win" class="rounded-lg w-24 p-2 text-center text-lg font-bold"></div>
                <div class="flex justify-between items-center"><label class="font-bold text-neutral-400">Draw</label><input type="number" id="edit-draw" class="rounded-lg w-24 p-2 text-center text-lg font-bold"></div>
                <div class="flex justify-between items-center"><label class="font-bold text-neutral-400">Lose</label><input type="number" id="edit-lose" class="rounded-lg w-24 p-2 text-center text-lg font-bold"></div>
                <div class="flex flex-col gap-1">
                    <label class="font-bold text-neutral-400">Result Status</label>
                    <select id="edit-result-status" class="rounded-lg w-full p-3 font-bold">
                        <option value="">-</option>
                        <option value="GS敗退">GS敗退</option>
                        <option value="ベスト32">ベスト32</option>
                        <option value="ベスト16">ベスト16</option>
                        <option value="ベスト8">ベスト8</option>
                        <option value="4位">4位</option>
                        <option value="3位">3位</option>
                        <option value="準優勝">準優勝</option>
                        <option value="優勝">優勝</option>
                    </select>
                </div>
                <div class="pt-4 flex gap-3">
                    <button onclick="submitUpdate()" id="save-btn" class="flex-1 bg-white text-black py-3 rounded-xl font-bold">Save</button>
                    <button onclick="closeModal()" class="flex-1 bg-neutral-800 text-white py-3 rounded-xl font-bold">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxRoPJeTAGT0xwgtHwRpT8jVNajQHdhci6tUPNEIh_Faa7bsD3GGIX8SgQd1a13CJhJ/exec";

        // 国名から国旗コードへの変換マップ（完全版）
        const flagMap = {
            // アジア (AFC)
            "日本": "jp", "韓国": "kr", "中国": "cn", "オーストラリア": "au", "サウジアラビア": "sa", 
            "イラン": "ir", "カタール": "qa", "イラク": "iq", "ウズベキスタン": "uz", "アラブ首長国連邦": "ae", 
            "ヨルダン": "jo", "オマーン": "om", "ベトナム": "vn", "タイ": "th", "インドネシア": "id",
            
            // ヨーロッパ (UEFA)
            "フランス": "fr", "スペイン": "es", "ドイツ": "de", "イタリア": "it", "イングランド": "gb", 
            "ポルトガル": "pt", "オランダ": "nl", "クロアチア": "hr", "スイス": "ch", "デンマーク": "dk", 
            "ポーランド": "pl", "ベルギー": "be", "トルコ": "tr", "ウクライナ": "ua", "チェコ": "cz", 
            "セルビア": "rs", "ハンガリー": "hu", "オーストリア": "at", "スコットランド": "gb-sct", 
            "ウェールズ": "gb-wls", "ボスニア・ヘルツェゴヴィナ": "ba", "スウェーデン": "se", "ノルウェー": "no",
            
            // 南米 (CONMEBOL)
            "ブラジル": "br", "アルゼンチン": "ar", "ウルグアイ": "uy", "コロンビア": "co", "エクアドル": "ec", 
            "ペルー": "pe", "チリ": "cl", "ベネズエラ": "ve", "パラグアイ": "py", "ボリビア": "bo",
            
            // 北中米カリブ (CONCACAF)
            "アメリカ": "us", "メキシコ": "mx", "mexico": "mx", "カナダ": "ca", "コスタリカ": "cr", 
            "パナマ": "pa", "ジャマイカ": "jm", "ホンジュラス": "hn", "エルサルバドル": "sv",
            
            // アフリカ (CAF)
            "モロッコ": "ma", "セネガル": "sn", "チュニジア": "tn", "カメルーン": "cm", "ガーナ": "gh", 
            "エジプト": "eg", "ナイジェリア": "ng", "アルジェリア": "dz", "南アフリカ": "za", "コートジボワール": "ci", 
            "コンゴ民主共和国": "cd", "マリ": "ml", "ブルキナファソ": "bf",
            
            // オセアニア (OFC)
            "ニュージーランド": "nz",
                
            // 不足の追加
             "ハイチ": "ht", "キュラソー": "cw", "カーボベルデ": "cv", "コンゴ": "cg"
        };

        let resultData = [];

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                resultData = data.result;
                renderResult(resultData);
                renderPlayers(data.players);
                renderRules(data.rules);
            } catch (e) { console.error(e); }
        }

        function renderResult(data) {
            const container = document.getElementById('result-list');
            container.innerHTML = ""; 
            const groups = data.reduce((acc, row, index) => {
                const g = row.Group || "-";
                if (!acc[g]) acc[g] = [];
                acc[g].push({ ...row, originalIndex: index });
                return acc;
            }, {});

            Object.keys(groups).sort().forEach(groupName => {
                let html = `<div class="mb-4"><div class="bg-neutral-800 text-neutral-400 p-2 px-4 font-bold text-[10px] tracking-widest uppercase">Group ${groupName}</div><div class="row-container header-row"><div class="col-team">TEAM</div><div class="col-player">PLAYER</div><div class="col-val">WIN</div><div class="col-val">DRAW</div><div class="col-val">LOSE</div><div class="col-result">RESULT</div></div>`;
                groups[groupName].forEach(row => {
                    const cleanTeam = row.Team.toString().toLowerCase().trim();
                    html += `<div class="row-container" onclick="prepareEdit(${row.originalIndex})"><div class="col-team"><img src="https://flagcdn.com/w40/${flagMap[cleanTeam] || flagMap[row.Team] || 'un'}.png" class="flag-icon"><span class="truncate">${row.Team}</span></div><div class="col-player truncate">${row.Player || '-'}</div><div class="col-val">${row.Win || 0}</div><div class="col-val">${row.Draw || 0}</div><div class="col-val">${row.Lose || 0}</div><div class="col-result truncate">${row.Result || '-'}</div></div>`;
                });
                container.innerHTML += html + `</div>`;
            });
        }

        function renderPlayers(data) {
            const container = document.getElementById('player-list');
            const players = data.reduce((acc, row) => {
                const p = row.Player || "Unknown";
                if (!acc[p]) acc[p] = { teams: [], total: row["Total Points"] || row["TotalPoints"] || 0 };
                acc[p].teams.push(row);
                return acc;
            }, {});
            container.innerHTML = Object.entries(players).map(([name, info]) => `
                <div class="mb-6 bg-neutral-900 border border-neutral-800 overflow-hidden"><div class="bg-neutral-800 p-4 flex justify-between items-center"><span class="text-lg font-bold">${name}</span><div class="text-right"><span class="text-[9px] block text-neutral-500 font-bold uppercase">Total Points</span><span class="text-2xl font-black text-yellow-500">${info.total}</span></div></div>
                ${info.teams.map(t => `<div class="flex p-4 border-b border-neutral-800 text-sm items-center"><div class="flex-1 flex items-center font-bold text-[13px]"><img src="https://flagcdn.com/w40/${flagMap[t.Team.toString().toLowerCase().trim()] || flagMap[t.Team] || 'un'}.png" class="flag-icon"><span>${t.Team}</span></div><div class="flex-1 text-center text-neutral-400 text-xs">${t.Result || '-'}</div><div class="flex-1 text-right font-bold text-blue-500">${t.Points || 0} pt</div></div>`).join('')}</div>`).join('');
        }

        function renderRules(data) {
            const container = document.getElementById('rules-list');
            if (!data || data.length === 0) { container.innerHTML = "<p class='p-10 text-center text-neutral-500'>No rules found.</p>"; return; }
            const headers = Object.keys(data[0]);
            container.innerHTML = `
                <div class="mt-4 mx-2 overflow-hidden rounded-lg border border-neutral-800 bg-neutral-900 shadow-xl">
                    <div class="bg-neutral-800 p-3 px-4 font-bold text-sm tracking-widest text-neutral-300">POINTS RULES</div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs">
                            <thead><tr class="border-b border-neutral-800 bg-neutral-900/50 text-neutral-500 font-bold uppercase">${headers.map(h => `<th class="p-3">${h}</th>`).join('')}</tr></thead>
                            <tbody class="divide-y divide-neutral-800">${data.map(row => `<tr class="hover:bg-neutral-800/30">${headers.map(h => `<td class="p-3 text-neutral-300">${row[h]}</td>`).join('')}</tr>`).join('')}</tbody>
                        </table>
                    </div>
                </div>`;
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active-content'));
            document.getElementById(tabId).classList.add('active-content');
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active-tab'));
            if(tabId === 'result-tab') document.getElementById('btn-result').classList.add('active-tab');
            else if(tabId === 'player-tab') document.getElementById('btn-player').classList.add('active-tab');
            else document.getElementById('btn-rules').classList.add('active-tab');
        }

        let editingTeamName = "";
        function prepareEdit(index) {
            const row = resultData[index];
            editingTeamName = row.Team;
            document.getElementById('modal-team-name').innerText = row.Team;
            document.getElementById('edit-win').value = row.Win || 0;
            document.getElementById('edit-draw').value = row.Draw || 0;
            document.getElementById('edit-lose').value = row.Lose || 0;
            document.getElementById('edit-result-status').value = row.Result || "";
            document.getElementById('edit-modal').classList.remove('hidden');
            const btn = document.getElementById('save-btn');
            btn.innerText = "Save"; btn.disabled = false;
        }

        function closeModal() { document.getElementById('edit-modal').classList.add('hidden'); }

        async function submitUpdate() {
            const btn = document.getElementById('save-btn');
            const payload = {
                team: editingTeamName,
                win: parseInt(document.getElementById('edit-win').value) || 0,
                draw: parseInt(document.getElementById('edit-draw').value) || 0,
                lose: parseInt(document.getElementById('edit-lose').value) || 0,
                resultStatus: document.getElementById('edit-result-status').value
            };
            btn.innerText = "Saving..."; btn.disabled = true;
            try {
                await fetch(API_URL, { method: "POST", body: JSON.stringify(payload), headers: { 'Content-Type': 'text/plain' } });
                setTimeout(async () => { await loadData(); closeModal(); }, 2500);
            } catch (e) { alert("Error!"); btn.innerText = "Save"; btn.disabled = false; }
        }
        loadData();
    </script>
</body>
</html>
