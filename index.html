<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WC2026 Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000000; color: #ffffff; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; padding-bottom: 140px; }
        .active-content { display: block; }
        
        /* 下部メニュー：iPhone15一画面 (7項目) */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #171717; display: flex; justify-content: space-around; padding: 10px 1px; z-index: 50; border-top: 1px solid #262626; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .nav-item { color: #737373; text-align: center; font-size: 10px; font-weight: bold; flex: 1; padding: 8px 0; border-radius: 10px; transition: all 0.2s; margin: 0 1px; white-space: nowrap; }
        .nav-item.active-tab { background: #ffffff; color: #000000; }

        /* GS/Player共通グリッド：昨日までの見やすい比率 */
        .grid-row {
            display: grid;
            grid-template-cols: 1.2fr 0.8fr 35px 35px 35px 1.1fr;
            align-items: center;
            width: 100%;
            padding: 12px 4px;
            font-size: 11px;
            border-bottom: 1px solid #222;
            background: #111;
        }
        .header-row { background: #262626; font-weight: bold; color: #737373; font-size: 10px; border-bottom: 2px solid #333; }

        .col-team { display: flex; align-items: center; font-weight: 900; overflow: hidden; white-space: nowrap; padding-left: 4px; }
        .col-player { color: #525252; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .col-val { text-align: center; font-weight: bold; }
        .col-result { text-align: center; font-weight: 900; color: #3b82f6; overflow: hidden; text-overflow: ellipsis; }
        .val-zero { color: #333; }
        .flag-icon { width: 18px; height: 12px; margin-right: 5px; border: 1px solid #333; flex-shrink: 0; }

        /* タイトルバー */
        .section-title { font-size: 10px; font-weight: 900; color: #fbbf24; letter-spacing: 0.15em; padding: 18px 8px 8px 8px; text-transform: uppercase; border-bottom: 1px solid #1a1a1a; margin-bottom: 10px; }

        /* トーナメント */
        .match-card { background: #111; border: 1px solid #262626; border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
        .owner-ebi { border-left: 4px solid #ef4444 !important; }
        .owner-gatchi { border-left: 4px solid #3b82f6 !important; }
        .owner-taichi { border-left: 4px solid #10b981 !important; }
        
        .winner-row { 
            background: #262626 !important; 
            box-shadow: inset 0 0 15px rgba(251, 191, 36, 0.4);
            border-top: 1px solid rgba(251, 191, 36, 0.5);
            border-bottom: 1px solid rgba(251, 191, 36, 0.5);
        }
        .winner-row .team-text { color: #fbbf24 !important; font-weight: 900; text-shadow: 0 0 8px rgba(251, 191, 36, 0.6); }

        /* Player表示：1行で見やすく */
        .player-row-simple {
            display: grid;
            grid-template-cols: 1.2fr 1.2fr 1fr;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid #262626;
            background: rgba(0,0,0,0.4);
            font-size: 12px;
        }

        .player-detail { display: none; }
        .player-detail.open { display: block; }
        .modal-bg { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px); }
        input, select { background: #262626 !important; border: 1px solid #404040 !important; color: white !important; outline: none; }
    </style>
</head>
<body>

    <div id="player-tab" class="tab-content active-content"><div id="player-list"></div></div>
    <div id="gs-tab" class="tab-content"><div id="gs-list"></div></div>
    <div id="r32-tab" class="tab-content"><div id="r32-list" class="p-4"></div></div>
    <div id="r16-tab" class="tab-content"><div id="r16-list" class="p-4"></div></div>
    <div id="qf-tab" class="tab-content"><div id="qf-list" class="p-4"></div></div>
    <div id="sf-final-tab" class="tab-content"><div id="sf-final-list" class="p-4"></div></div>
    <div id="rules-tab" class="tab-content"><div id="rules-list"></div></div>

    <nav class="bottom-nav">
        <button id="btn-player" onclick="showTab('player-tab')" class="nav-item active-tab">Player</button>
        <button id="btn-gs" onclick="showTab('gs-tab')" class="nav-item">GS</button>
        <button id="btn-r32" onclick="showTab('r32-tab')" class="nav-item">R32</button>
        <button id="btn-r16" onclick="showTab('r16-tab')" class="nav-item">R16</button>
        <button id="btn-qf" onclick="showTab('qf-tab')" class="nav-item">QF</button>
        <button id="btn-sf-final" onclick="showTab('sf-final-tab')" class="nav-item">SF/Final</button>
        <button id="btn-rules" onclick="showTab('rules-tab')" class="nav-item">Rules</button>
    </nav>

    <!-- モーダル -->
    <div id="edit-modal" class="hidden fixed inset-0 modal-bg flex items-center justify-center p-4 z-[100]">
        <div class="bg-[#171717] p-6 rounded-2xl w-full max-w-sm border border-neutral-800 shadow-2xl">
            <h2 id="modal-team-name" class="text-xl font-bold mb-6 text-white text-center">Update Status</h2>
            <div id="modal-gs-fields" class="space-y-4 text-sm mb-4">
                <div class="flex justify-between items-center"><label class="text-neutral-400">Win</label><input type="number" id="edit-win" class="rounded-lg w-20 p-2 text-center font-bold"></div>
                <div class="flex justify-between items-center"><label class="text-neutral-400">Draw</label><input type="number" id="edit-draw" class="rounded-lg w-20 p-2 text-center font-bold"></div>
                <div class="flex justify-between items-center"><label class="text-neutral-400">Lose</label><input type="number" id="edit-lose" class="rounded-lg w-20 p-2 text-center font-bold"></div>
            </div>
            <div class="flex flex-col gap-1 mb-6">
                <label class="text-neutral-400 text-sm">Result Status</label>
                <select id="edit-result-status" class="rounded-lg w-full p-3 font-bold text-black">
                    <option value="">-</option><option value="GS敗退">GS敗退</option><option value="ベスト32">ベスト32</option>
                    <option value="ベスト16">ベスト16</option><option value="ベスト8">ベスト8</option><option value="4位">4位</option>
                    <option value="3位">3位</option><option value="準優勝">準優勝</option><option value="優勝">優勝</option>
                </select>
            </div>
            <div class="flex gap-3">
                <button onclick="submitUpdate()" id="save-btn" class="flex-1 bg-white text-black py-3 rounded-xl font-bold">Save</button>
                <button onclick="closeModal()" class="flex-1 bg-neutral-800 text-white py-3 rounded-xl font-bold">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyNG9kLk837e5hbvoC_G2ten_HyPID0Znp3_atCkieLVkP8FrGit5skyaSbjHnyBw3S/exec";
        
        const flagMap = { 
            "日本": "jp", "韓国": "kr", "中国": "cn", "オーストラリア": "au", "サウジアラビア": "sa", "イラン": "ir", "カタール": "qa", "イラク": "iq", "ヨルダン": "jo", "ウズベキスタン": "uz", "パナマ": "pa",
            "フランス": "fr", "スペイン": "es", "ドイツ": "de", "イタリア": "it", "イングランド": "gb", "ポルトガル": "pt", "オランダ": "nl", "クロアチア": "hr", "スイス": "ch", "デンマーク": "dk", "ポーランド": "pl", "ベルギー": "be", "トルコ": "tr", "チェコ": "cz", "オーストリア": "at", "スコットランド": "gb-sct", "ウェールズ": "gb-wls", "ボスニア・ヘルツェゴヴィナ": "ba", "ノルウェー": "no", "スウェーデン": "se",
            "ブラジル": "br", "アルゼンチン": "ar", "ウルグアイ": "uy", "コロンビア": "co", "エクアドル": "ec", "メキシコ": "mx", "mexico": "mx", "カナダ": "ca", "アメリカ": "us", "コートジボワール": "ci",
            "モロッコ": "ma", "セネガル": "sn", "チュニジア": "tn", "エジプト": "eg", "ナイジェリア": "ng", "アルジェリア": "dz", "ガーナ": "gh", "南アフリカ": "za", "コンゴ": "cg", "ハイチ": "ht", "キュラソー": "cw", "カーボベルデ": "cv", "ニュージーランド": "nz"
        };
        
        const ownerClasses = { "えび": "owner-ebi", "がっち": "owner-gatchi", "たいち": "owner-taichi" };
        const bracketOrder = ["南アフリカ", "カナダ", "オランダ", "モロッコ", "ドイツ", "パラグアイ", "フランス", "スウェーデン", "ベルギー", "セネガル", "アメリカ", "ボスニア・ヘルツェゴヴィナ", "スペイン", "オーストリア", "ポルトガル", "クロアチア", "ブラジル", "日本", "コートジボワール", "ノルウェー", "メキシコ", "エクアドル", "イングランド", "コンゴ", "スイス", "アルジェリア", "コロンビア", "ガーナ", "オーストラリア", "エジプト", "アルゼンチン", "カーボベルデ"];

        const statusRank = { "":0, "-":0, "GS敗退":1, "ベスト32":2, "ベスト16":3, "ベスト8":4, "4位":5, "3位":6, "準優勝":7, "優勝":8 };
        const roundTargetRank = { 32: 3, 16: 4, 8: 5, 4: 7, 2: 8, "3rd": 6 };

        let db = { result: [], players: [], rules: [] };
        let tournament = { 32: [], 16: [], 8: [], 4: [], 2: [], "3rd": [] };

        async function loadData(keepTab = true) {
            try {
                const res = await fetch(API_URL);
                db = await res.json();
                initTournamentStructure();
                renderAll();
            } catch (e) { console.error(e); }
        }

        function initTournamentStructure() {
            tournament[32] = [];
            for (let i = 0; i < 16; i++) {
                const t1 = db.result.find(d => d.Team === bracketOrder[i*2]);
                const t2 = db.result.find(d => d.Team === bracketOrder[i*2+1]);
                const match = { teams: [createTeamObj(t1), createTeamObj(t2)], winner: null };
                if (match.teams[0] && statusRank[match.teams[0].status] >= roundTargetRank[32]) match.winner = 0;
                else if (match.teams[1] && statusRank[match.teams[1].status] >= roundTargetRank[32]) match.winner = 1;
                tournament[32].push(match);
            }
            [16, 8, 4].forEach(r => {
                const prev = r === 16 ? 32 : r === 8 ? 16 : 8;
                tournament[r] = [];
                for (let i = 0; i < prev/4; i++) {
                    const m1 = tournament[prev][i*2]; const m2 = tournament[prev][i*2+1];
                    const team1 = m1.winner !== null ? m1.teams[m1.winner] : null;
                    const team2 = m2.winner !== null ? m2.teams[m2.winner] : null;
                    const match = { teams: [team1, team2], winner: null };
                    if (team1 && statusRank[team1.status] >= roundTargetRank[r]) match.winner = 0;
                    else if (team2 && statusRank[team2.status] >= roundTargetRank[r]) match.winner = 1;
                    tournament[r].push(match);
                }
            });
            const sf1 = tournament[4][0]; const sf2 = tournament[4][1];
            const f1 = sf1.winner !== null ? sf1.teams[sf1.winner] : null;
            const f2 = sf2.winner !== null ? sf2.teams[sf2.winner] : null;
            tournament[2] = [{ teams: [f1, f2], winner: (f1 && statusRank[f1.status] >= roundTargetRank[2]) ? 0 : (f2 && statusRank[f2.status] >= roundTargetRank[2] ? 1 : null) }];
            const t3_1 = sf1.winner !== null ? sf1.teams[1 - sf1.winner] : null;
            const t3_2 = sf2.winner !== null ? sf2.teams[1 - sf2.winner] : null;
            tournament["3rd"] = [{ teams: [t3_1, t3_2], winner: (t3_1 && statusRank[t3_1.status] >= roundTargetRank["3rd"]) ? 0 : (t3_2 && statusRank[t3_2.status] >= roundTargetRank["3rd"] ? 1 : null) }];
        }

        function createTeamObj(t) { return t ? { name: t.Team, owner: t.Player, flag: flagMap[t.Team] || "un", status: t.Result } : null; }

        function renderAll() {
            renderGS();
            renderBracket(32, "Round of 32");
            renderBracket(16, "Round of 16");
            renderBracket(8, "Quarter Finals");
            renderSFFinal();
            renderPlayers();
            renderRules();
        }

        function renderGS() {
            const container = document.getElementById('gs-list');
            if(!container) return;
            container.innerHTML = "";
            const groups = db.result.reduce((acc, row) => {
                const g = row.Group || "-";
                if (!acc[g]) acc[g] = [];
                acc[g].push({ ...row, pts: (parseInt(row.Win)||0)*3 + (parseInt(row.Draw)||0) });
                return acc;
            }, {});
            Object.keys(groups).sort().forEach(gName => {
                const sorted = groups[gName].sort((a,b) => b.pts - a.pts);
                let html = `<div class="mb-4">
                    <div class="bg-neutral-800 text-neutral-500 p-2 px-4 font-bold text-[10px] tracking-widest uppercase">GROUP ${gName}</div>
                    <div class="grid-row header-row">
                        <div class="col-team">TEAM</div><div class="col-player">PLAYER</div><div class="col-val">W</div><div class="col-val">D</div><div class="col-val">L</div><div class="col-result">RESULT</div>
                    </div>`;
                sorted.forEach(row => {
                    const win = parseInt(row.Win)||0; const draw = parseInt(row.Draw)||0; const lose = parseInt(row.Lose)||0;
                    html += `<div class="grid-row" onclick="openEditModal('${row.Team}', true)">
                        <div class="col-team"><img src="https://flagcdn.com/w40/${flagMap[row.Team] || 'un'}.png" class="flag-icon"><span>${row.Team}</span></div>
                        <div class="col-player">${row.Player || '-'}</div>
                        <div class="col-val ${win > 0 ? '' : 'val-zero'}">${win}</div>
                        <div class="col-val ${draw > 0 ? '' : 'val-zero'}">${draw}</div>
                        <div class="col-val ${lose > 0 ? '' : 'val-zero'}">${lose}</div>
                        <div class="col-result">${row.Result || '-'}</div>
                    </div>`;
                });
                container.innerHTML += html + `</div>`;
            });
        }

        function renderBracket(round, title) {
            const id = `${round === 32 ? 'r32' : round === 16 ? 'r16' : 'qf'}-list`;
            const container = document.getElementById(id);
            if(!container) return;
            container.innerHTML = `<div class="section-title">${title}</div>`;
            tournament[round].forEach((match, mIdx) => { container.innerHTML += createMatchHtml(match, round, mIdx); });
        }

        function renderSFFinal() {
            const container = document.getElementById('sf-final-list');
            if(!container) return;
            container.innerHTML = `<div class="section-title">Semi Finals</div>`;
            tournament[4].forEach((m, i) => container.innerHTML += createMatchHtml(m, 4, i));
            container.innerHTML += `<div class="section-title">3rd Place Match</div>`;
            container.innerHTML += createMatchHtml(tournament["3rd"][0], "3rd", 0);
            container.innerHTML += `<div class="section-title">Final</div>`;
            container.innerHTML += createMatchHtml(tournament[2][0], 2, 0);
        }

        function createMatchHtml(match, round, mIdx) {
            let html = `<div class="match-card">`;
            match.teams.forEach((team, tIdx) => {
                const ownerClass = team ? (ownerClasses[team.owner] || "") : "";
                const isWinner = match.winner === tIdx;
                html += `<div id="node-${round}-${mIdx}-${tIdx}" onclick="handleTournamentClick('${round}', ${mIdx}, ${tIdx})" class="flex items-center justify-between p-4 transition-all duration-200 ${ownerClass} ${isWinner ? 'winner-row' : ''}">
                    <div class="flex items-center space-x-3 flex-1">
                        <img src="https://flagcdn.com/w40/${team ? team.flag : 'un'}.png" class="flag-icon">
                        <span class="team-text text-[13px] font-bold ${!team ? 'text-neutral-800' : ''}">${team ? team.name : 'TBD'}</span>
                    </div>
                    <span class="text-[9px] font-black text-neutral-500 uppercase w-10 text-right">${team ? team.owner : ''}</span>
                </div>${tIdx === 0 ? '<div class="h-[1px] bg-neutral-800/40 mx-4"></div>' : ''}`;
            });
            return html + `</div>`;
        }

        function handleTournamentClick(round, mIdx, tIdx) {
            const match = tournament[round][mIdx]; const team = match.teams[tIdx]; if (!team) return;
            const element = document.getElementById(`node-${round}-${mIdx}-${tIdx}`);
            if (match.winner === tIdx) {
                element.classList.remove('winner-row');
                const prevStatus = { "32":"ベスト32", "16":"ベスト16", "8":"ベスト8", "4":"ベスト8", "2":"準優勝", "3rd":"4位" }[round];
                updateStatusDirectly(team.name, prevStatus);
            } else { openEditModal(team.name, false); }
        }

        async function updateStatusDirectly(teamName, status) {
            try { await fetch(API_URL, { method: "POST", mode: 'no-cors', body: JSON.stringify({ team: teamName, resultStatus: status }) }); loadData(true); } catch (e) { console.error(e); }
        }

        function renderPlayers() {
            const container = document.getElementById('player-list');
            if(!container) return;
            const pData = db.players.reduce((acc, row) => {
                const n = row.Player || "Unknown";
                if (!acc[n]) acc[n] = { teams: [], total: row["Total Points"] || 0 };
                acc[n].teams.push(row);
                return acc;
            }, {});
            container.innerHTML = Object.entries(pData).map(([name, info], idx) => `
                <div class="mb-4 bg-neutral-900 border border-neutral-800 overflow-hidden shadow-xl">
                    <div onclick="togglePlayer(${idx})" class="bg-neutral-800 p-5 flex justify-between items-center px-4 cursor-pointer">
                        <span class="text-xl font-bold">${name}</span>
                        <div class="flex items-center space-x-4">
                            <div class="text-right"><span class="text-[10px] block text-neutral-500 font-bold uppercase">Total Points</span><span class="text-3xl font-black text-yellow-500">${info.total}</span></div>
                            <span id="arrow-${idx}" class="text-neutral-500">▼</span>
                        </div>
                    </div>
                    <div id="detail-${idx}" class="player-detail">
                        ${info.teams.map(t => `
                            <div class="player-row-simple">
                                <div class="col-team" style="padding-left:0;"><img src="https://flagcdn.com/w40/${flagMap[t.Team] || 'un'}.png" class="flag-icon"><span>${t.Team}</span></div>
                                <div class="text-center text-neutral-400 text-[11px]">${t.Result || '-'}</div>
                                <div class="text-right font-bold text-blue-500" style="padding-right:5px;">${t.Points || 0} pt</div>
                            </div>`).join('')}
                    </div>
                </div>`).join('');
        }

        function togglePlayer(idx) {
            const detail = document.getElementById(`detail-${idx}`); const arrow = document.getElementById(`arrow-${idx}`);
            if(!detail) return; const isOpen = detail.classList.toggle('open'); arrow.innerText = isOpen ? '▲' : '▼';
        }

        function renderRules() {
            const container = document.getElementById('rules-list');
            if (!container || !db.rules.length) return;
            const headers = Object.keys(db.rules[0]);
            container.innerHTML = `<div class="mt-4 mx-2 overflow-hidden rounded-lg border border-neutral-800 bg-neutral-900"><div class="bg-neutral-800 p-3 px-4 font-bold text-xs tracking-widest text-neutral-300 uppercase">Points Rules</div><div class="overflow-x-auto"><table class="w-full text-left text-xs"><thead><tr class="border-b border-neutral-800 text-neutral-500">${headers.map(h => `<th class="p-3">${h}</th>`).join('')}</tr></thead><tbody class="divide-y divide-neutral-800">${db.rules.map(row => `<tr>${headers.map(h => `<td class="p-3 text-neutral-300">${row[h]}</td>`).join('')}</tr>`).join('')}</tbody></table></div></div>`;
        }

        let editTarget = { team: "", isGS: false };
        function openEditModal(teamName, isGS) {
            if (!teamName || teamName === "TBD") return;
            editTarget = { team: teamName, isGS };
            const row = db.result.find(d => d.Team === teamName);
            document.getElementById('modal-team-name').innerText = teamName;
            document.getElementById('modal-gs-fields').style.display = isGS ? 'block' : 'none';
            if (isGS) { document.getElementById('edit-win').value = row.Win || 0; document.getElementById('edit-draw').value = row.Draw || 0; document.getElementById('edit-lose').value = row.Lose || 0; }
            document.getElementById('edit-result-status').value = row.Result || "";
            document.getElementById('edit-modal').classList.remove('hidden');
            const btn = document.getElementById('save-btn'); btn.innerText = "Save"; btn.disabled = false;
        }

        function closeModal() { document.getElementById('edit-modal').classList.add('hidden'); }

        async function submitUpdate() {
            const btn = document.getElementById('save-btn');
            const payload = { team: editTarget.team, resultStatus: document.getElementById('edit-result-status').value };
            if (editTarget.isGS) { payload.win = parseInt(document.getElementById('edit-win').value) || 0; payload.draw = parseInt(document.getElementById('edit-draw').value) || 0; payload.lose = parseInt(document.getElementById('edit-lose').value) || 0; }
            btn.innerText = "Saving..."; btn.disabled = true;
            try { await fetch(API_URL, { method: "POST", mode: 'no-cors', body: JSON.stringify(payload) }); setTimeout(async () => { await loadData(true); closeModal(); }, 1500); } catch (e) { alert("Error!"); btn.disabled = false; btn.innerText = "Save"; }
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active-content'));
            document.getElementById(tabId).classList.add('active-content');
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active-tab'));
            const btnId = 'btn-' + tabId.replace('-tab', '');
            if (document.getElementById(btnId)) document.getElementById(btnId).classList.add('active-tab');
            window.scrollTo(0,0);
        }

        loadData(false);
    </script>
</body>
</html>
