<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORLDCUP 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .scroll-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; background: white; }
        table { min-width: 650px; border-collapse: collapse; width: 100%; table-layout: fixed; }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #eee; font-size: 12px; }
        th { background: #f8fafc; color: #64748b; font-weight: bold; }
        .team-cell { text-align: left; display: flex; align-items: center; font-weight: bold; width: 150px; white-space: nowrap; }
        .flag-icon { width: 20px; height: 14px; object-fit: cover; margin-right: 6px; border: 1px solid #ddd; flex-shrink: 0; }
        .tab-content { display: none; padding-bottom: 100px; }
        .active { display: block; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1e3a8a; display: flex; justify-content: space-around; padding: 15px; z-index: 50; }
        .nav-item { color: white; text-align: center; font-size: 16px; font-weight: bold; flex: 1; }
    </style>
</head>
<body class="bg-gray-100">

    <div id="result-tab" class="tab-content active">
        <div id="result-list"><div class="p-10 text-center">読み込み中...</div></div>
    </div>

    <div id="player-tab" class="tab-content">
        <div id="player-list"><div class="p-10 text-center">読み込み中...</div></div>
    </div>

    <nav class="bottom-nav">
        <button onclick="showTab('result-tab')" class="nav-item">Result</button>
        <button onclick="showTab('player-tab')" class="nav-item border-l border-blue-700">Player</button>
    </nav>

    <!-- 編集モーダル -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 z-[100]">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm shadow-2xl">
            <h2 id="modal-team-name" class="text-xl font-bold mb-6 text-blue-900 text-center">数値を入力</h2>
            <div class="space-y-4">
                <div class="flex justify-between items-center"><label class="font-bold">Win</label><input type="number" id="edit-win" class="border-2 rounded-lg w-24 p-2 text-center"></div>
                <div class="flex justify-between items-center"><label class="font-bold">Draw</label><input type="number" id="edit-draw" class="border-2 rounded-lg w-24 p-2 text-center"></div>
                <div class="flex justify-between items-center"><label class="font-bold">Lose</label><input type="number" id="edit-lose" class="border-2 rounded-lg w-24 p-2 text-center"></div>
                <div class="flex flex-col gap-1">
                    <label class="font-bold">Result</label>
                    <select id="edit-result-status" class="border-2 rounded-lg w-full p-2 bg-gray-50">
                        <option value="GS敗退">GS敗退</option>
                        <option value="Best 32">Best 32</option>
                        <option value="Best 16">Best 16</option>
                        <option value="Best 8">Best 8</option>
                        <option value="準決勝">準決勝</option>
                        <option value="準優勝">準優勝</option>
                        <option value="優勝">優勝</option>
                    </select>
                </div>
                <div class="pt-4 flex gap-2">
                    <button onclick="submitUpdate()" id="save-btn" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold">Save</button>
                    <button onclick="closeModal()" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-xl font-bold">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxjOJLiIpiE58ivDd472FYPD6A7uYWdPs0iN4-PSIHj7VujnyH-2LwbRrzjiuuuyc0/exec";

        const flagMap = { "日本": "jp", "アルゼンチン": "ar", "フランス": "fr", "スペイン": "es", "ドイツ": "de", "ブラジル": "br", "イングランド": "gb", "モロッコ": "ma", "アメリカ": "us", "メキシコ": "mx", "カナダ": "ca", "イタリア": "it" };

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                const currentData = await res.json();
                
                if (!currentData.result || !currentData.players) {
                    throw new Error("スプレッドシートのデータ構造が壊れています。");
                }
                
                renderResult(currentData.result);
                renderPlayers(currentData.players);
            } catch (e) {
                console.error(e);
                document.getElementById('result-list').innerHTML = `
                    <div class="p-10 text-center">
                        <p class="text-red-500 font-bold">エラーが発生しました</p>
                        <p class="text-xs text-gray-500 mt-2">${e.message}</p>
                        <button onclick="loadData()" class="mt-4 bg-blue-500 text-white px-4 py-2 rounded">再試行</button>
                    </div>`;
            }
        }

        function renderResult(data) {
            const container = document.getElementById('result-list');
            const groups = data.reduce((acc, row) => {
                const g = row.Group || "Unknown";
                if (!acc[g]) acc[g] = [];
                acc[g].push(row);
                return acc;
            }, {});

            container.innerHTML = Object.keys(groups).sort().map(groupName => `
                <div class="mb-6 bg-white shadow-sm">
                    <div class="bg-blue-900 text-white p-2 px-4 font-bold text-sm text-left">Group ${groupName}</div>
                    <div class="scroll-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th style="width:160px; text-align:left; padding-left:10px;">Team</th>
                                    <th style="width:100px; text-align:left;">Player</th>
                                    <th style="width:60px;">Win</th>
                                    <th style="width:60px;">Draw</th>
                                    <th style="width:60px;">Lose</th>
                                    <th style="width:100px;">Result</th>
                                    <th style="width:40px;"></th>
                                </tr>
                            </thead>
                            <tbody>
                                ${groups[groupName].map(row => `
                                    <tr onclick="openModal('${row.Team}', ${row.Win || 0}, ${row.Draw || 0}, ${row.Lose || 0}, '${row.Result || 'GS敗退'}')">
                                        <td><div class="team-cell"><img src="https://flagcdn.com/w40/${flagMap[row.Team] || 'un'}.png" class="flag-icon">${row.Team || '不明'}</div></td>
                                        <td style="text-align:left; color:#666;">${row.Player || '-'}</td>
                                        <td>${row.Win || 0}</td>
                                        <td>${row.Draw || 0}</td>
                                        <td>${row.Lose || 0}</td>
                                        <td class="font-bold text-blue-600">${row.Result || '-'}</td>
                                        <td style="color:#ccc;">✎</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `).join('');
        }

        function renderPlayers(data) {
            const container = document.getElementById('player-list');
            const players = data.reduce((acc, row) => {
                const p = row.Player || "Unknown";
                // Total Points または TotalPoints という名前で探す
                const total = row["Total Points"] || row["TotalPoints"] || 0;
                if (!acc[p]) acc[p] = { teams: [], total: total };
                acc[p].teams.push(row);
                return acc;
            }, {});

            container.innerHTML = Object.entries(players).map(([name, info]) => `
                <div class="mb-6 bg-white shadow mx-2 mt-4 rounded-lg overflow-hidden">
                    <div class="bg-gray-800 text-white p-4 flex justify-between items-center">
                        <span class="text-lg font-bold">${name}</span>
                        <div class="text-right">
                            <span class="text-[10px] block text-gray-400 uppercase">Total Points</span>
                            <span class="text-2xl font-bold text-yellow-400">${info.total}</span>
                        </div>
                    </div>
                    <div class="scroll-wrapper">
                        <table style="min-width:350px;">
                            <thead>
                                <tr>
                                    <th style="text-align:left; padding-left:15px; width:150px;">Team</th>
                                    <th style="text-align:left; width:120px;">Result</th>
                                    <th style="text-align:right; padding-right:15px;">Points</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${info.teams.map(t => `
                                    <tr>
                                        <td><div class="team-cell" style="padding-left:7px;"><img src="https://flagcdn.com/w40/${flagMap[t.Team] || 'un'}.png" class="flag-icon">${t.Team || '不明'}</div></td>
                                        <td style="text-align:left; color:#666; font-size:11px;">${t.Result || '-'}</td>
                                        <td style="text-align:right; padding-right:15px;" class="font-bold text-blue-600">${t.Points || 0} pt</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `).join('');
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        let editingTeam = "";
        function openModal(team, win, draw, lose, status) {
            editingTeam = team;
            document.getElementById('modal-team-name').innerText = team;
            document.getElementById('edit-win').value = win;
            document.getElementById('edit-draw').value = draw;
            document.getElementById('edit-lose').value = lose;
            document.getElementById('edit-result-status').value = status;
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('edit-modal').classList.add('hidden'); }

        async function submitUpdate() {
            const btn = document.getElementById('save-btn');
            const payload = {
                team: editingTeam,
                win: parseInt(document.getElementById('edit-win').value) || 0,
                draw: parseInt(document.getElementById('edit-draw').value) || 0,
                lose: parseInt(document.getElementById('edit-lose').value) || 0,
                resultStatus: document.getElementById('edit-result-status').value
            };
            btn.innerText = "Saving...";
            btn.disabled = true;
            try {
                await fetch(API_URL, { method: "POST", mode: 'no-cors', body: JSON.stringify(payload) });
                setTimeout(() => {
                    closeModal();
                    btn.innerText = "Save";
                    btn.disabled = false;
                    loadData(); 
                }, 1200);
            } catch (e) {
                alert("保存エラー");
                btn.disabled = false;
                btn.innerText = "Save";
            }
        }
        loadData();
    </script>
</body>
</html>
