<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORLDCUP 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .flag-icon { width: 20px; height: 14px; object-fit: cover; margin-right: 4px; border: 1px solid #ddd; }
        .tab-content { display: none; padding-bottom: 100px; }
        .active { display: block; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1e3a8a; display: flex; justify-content: space-around; padding: 15px; z-index: 50; }
        .nav-item { color: white; text-align: center; font-size: 16px; font-weight: bold; flex: 1; }
        .grid-header { display: grid; grid-template-cols: 2.5fr 1.5fr 0.8fr 0.8fr 0.8fr 1.8fr; gap: 2px; font-size: 10px; color: #666; font-weight: bold; padding: 8px; border-bottom: 1px solid #eee; background: #f9f9f9; text-align: center; }
        .grid-row { display: grid; grid-template-cols: 2.5fr 1.5fr 0.8fr 0.8fr 0.8fr 1.8fr; gap: 2px; align-items: center; padding: 12px 8px; border-bottom: 1px solid #f0f0f0; background: white; font-size: 13px; text-align: center; }
        .team-col { text-align: left; display: flex; align-items: center; font-weight: bold; }
        .player-grid-header { display: grid; grid-template-cols: 3fr 3fr 2fr; gap: 4px; font-size: 11px; color: #666; padding: 8px; border-bottom: 1px solid #eee; background: #f9f9f9; }
        .player-grid-row { display: grid; grid-template-cols: 3fr 3fr 2fr; gap: 4px; align-items: center; padding: 12px 8px; border-bottom: 1px solid #f0f0f0; background: white; font-size: 13px; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="result-tab" class="tab-content active">
        <div id="result-list" class="p-4 text-center">読み込み中...</div>
    </div>

    <div id="player-tab" class="tab-content">
        <div id="player-list" class="p-4 text-center">読み込み中...</div>
    </div>

    <nav class="bottom-nav">
        <button onclick="showTab('result-tab')" class="nav-item">Result</button>
        <button onclick="showTab('player-tab')" class="nav-item">Player</button>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxjOJLiIpiE58ivDd472FYPD6A7uYWdPs0iN4-PSIHj7VujnyH-2LwbRrzjiuuuyc0/exec";

        const flagMap = { "日本": "jp", "アルゼンチン": "ar", "フランス": "fr", "スペイン": "es", "ドイツ": "de", "ブラジル": "br", "イングランド": "gb", "モロッコ": "ma" };

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                const currentData = await res.json();
                console.log("Data received:", currentData);

                if (!currentData.result || !currentData.players) {
                    throw new Error("スプレッドシートのデータ構造が正しくありません。シート名を確認してください。");
                }

                renderResult(currentData.result);
                renderPlayers(currentData.players);
            } catch (e) {
                console.error(e);
                document.getElementById('result-list').innerHTML = `<div class="p-4 bg-red-100 text-red-700 rounded">エラー発生: ${e.message}</div>`;
            }
        }

        function renderResult(data) {
            const container = document.getElementById('result-list');
            if (data.length === 0) { container.innerHTML = "Resultシートにデータがありません"; return; }

            const groups = data.reduce((acc, row) => {
                const gName = row.Group || "Unknown";
                if (!acc[gName]) acc[gName] = [];
                acc[gName].push(row);
                return acc;
            }, {});

            container.innerHTML = Object.keys(groups).sort().map(groupName => `
                <div class="mb-4 bg-white shadow-sm">
                    <div class="bg-blue-900 text-white p-2 px-4 font-bold text-left">Group ${groupName}</div>
                    <div class="grid-header">
                        <div class="text-left">Team</div><div>Player</div><div>W</div><div>D</div><div>L</div><div>Result</div>
                    </div>
                    ${groups[groupName].map(row => `
                        <div class="grid-row">
                            <div class="team-col">
                                <img src="https://flagcdn.com/w40/${flagMap[row.Team] || 'un'}.png" class="flag-icon">
                                <span class="truncate">${row.Team || '不明'}</span>
                            </div>
                            <div class="text-gray-500 truncate text-[11px]">${row.Player || '-'}</div>
                            <div>${row.Win ?? 0}</div>
                            <div>${row.Draw ?? 0}</div>
                            <div>${row.Lose ?? 0}</div>
                            <div class="text-blue-600 font-bold text-[11px]">${row.Result || '-'}</div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        function renderPlayers(data) {
            const container = document.getElementById('player-list');
            if (data.length === 0) { container.innerHTML = "Playersシートにデータがありません"; return; }

            const players = data.reduce((acc, row) => {
                const pName = row.Player || "Unknown";
                if (!acc[pName]) acc[pName] = { teams: [], total: row["Total Points"] || 0 };
                acc[pName].teams.push(row);
                return acc;
            }, {});

            container.innerHTML = Object.entries(players).map(([name, info]) => `
                <div class="mb-6 bg-white shadow-sm">
                    <div class="bg-gray-800 text-white p-3 flex justify-between items-center px-4">
                        <span class="text-lg font-bold text-left">${name}</span>
                        <div class="text-right">
                            <span class="text-[10px] block text-gray-400">Total Points</span>
                            <span class="text-xl font-bold text-yellow-400">${info.total}</span>
                        </div>
                    </div>
                    <div class="player-grid-header">
                        <div class="text-left">Team</div><div>Result</div><div>Points</div>
                    </div>
                    ${info.teams.map(t => `
                        <div class="player-grid-row">
                            <div class="team-col">
                                <img src="https://flagcdn.com/w40/${flagMap[t.Team] || 'un'}.png" class="flag-icon">
                                <span>${t.Team || '不明'}</span>
                            </div>
                            <div class="text-gray-600 text-[12px] text-left">${t.Result || '-'}</div>
                            <div class="font-bold text-right pr-4 text-blue-600">${t.Points || 0} pt</div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        loadData();
    </script>
</body>
</html>
