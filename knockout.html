<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WC2026 Knockout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0a0a0a; color: #ffffff; }
        .tab-btn.active { border-bottom: 3px solid #ffffff; color: #ffffff; }
        .owner-ebi { border-left: 4px solid #ef4444; }   /* 赤 */
        .owner-gatchi { border-left: 4px solid #3b82f6; } /* 青 */
        .owner-taichi { border-left: 4px solid #10b981; } /* 緑 */
        .winner { background: #262626 !important; border: 1px solid #ffffff !important; }
        .winner .team-name { font-weight: 900; color: #fbbf24; }
    </style>
</head>
<body class="pb-10">

    <!-- ラウンド切り替えタブ -->
    <div class="sticky top-0 bg-[#0a0a0a] z-50 border-b border-neutral-800">
        <div class="flex justify-between text-neutral-500 text-[10px] font-bold uppercase p-2">
            <button onclick="showRound(32)" id="tab32" class="tab-btn active px-2 py-2">Best 32</button>
            <button onclick="showRound(16)" id="tab16" class="tab-btn px-2 py-2">Best 16</button>
            <button onclick="showRound(8)" id="tab8" class="tab-btn px-2 py-2">Best 8</button>
            <button onclick="showRound(4)" id="tab4" class="tab-btn px-2 py-2">Semi</button>
            <button onclick="showRound(2)" id="tab2" class="tab-btn px-2 py-2">Final</button>
        </div>
    </div>

    <!-- 説明 -->
    <div class="p-3 text-[10px] text-neutral-400 text-center">
        勝利チームをタップすると次のラウンドに自動進出します
    </div>

    <!-- トーナメント本体 -->
    <div id="tournament-container" class="p-4 space-y-4">
        <!-- JSで対戦カードが生成される -->
    </div>

    <script>
        // 初期の32チームデータ（仮）
        // オーナー: 0=えび, 1=がっち, 2=たいち
        const players = ["えび", "がっち", "たいち"];
        const ownerClasses = ["owner-ebi", "owner-gatchi", "owner-taichi"];
        
        let tournament = {
            32: [
                { id: 1, teams: [{ name: "アルゼンチン", owner: 0, flag: "ar" }, { name: "日本", owner: 2, flag: "jp" }], winner: null },
                { id: 2, teams: [{ name: "フランス", owner: 1, flag: "fr" }, { name: "モロッコ", owner: 0, flag: "ma" }], winner: null },
                { id: 3, teams: [{ name: "スペイン", owner: 2, flag: "es" }, { name: "カナダ", owner: 1, flag: "ca" }], winner: null },
                { id: 4, teams: [{ name: "ドイツ", owner: 0, flag: "de" }, { name: "ブラジル", owner: 1, flag: "br" }], winner: null },
                // ... 実際には16カード分作成
            ],
            16: Array(8).fill(null).map((_, i) => ({ id: i, teams: [null, null], winner: null })),
            8: Array(4).fill(null).map((_, i) => ({ id: i, teams: [null, null], winner: null })),
            4: Array(2).fill(null).map((_, i) => ({ id: i, teams: [null, null], winner: null })),
            2: Array(1).fill(null).map((_, i) => ({ id: i, teams: [null, null], winner: null }))
        };

        // 32チーム埋めるためのダミーデータ生成
        for(let i=4; i<16; i++) {
            tournament[32].push({
                id: i+1,
                teams: [
                    { name: "Team "+(i*2+1), owner: i%3, flag: "un" },
                    { name: "Team "+(i*2+2), owner: (i+1)%3, flag: "un" }
                ],
                winner: null
            });
        }

        let currentViewRound = 32;

        function showRound(round) {
            currentViewRound = round;
            // タブの見た目更新
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab' + round).classList.add('active');
            render();
        }

        function advance(round, matchIdx, teamIdx) {
            const match = tournament[round][matchIdx];
            const selectedTeam = match.teams[teamIdx];
            if (!selectedTeam) return;

            // 現在のカードに勝者をセット
            match.winner = teamIdx;

            // 次のラウンドに進出させるロジック
            const nextRoundMap = { 32: 16, 16: 8, 8: 4, 4: 2 };
            const nextRound = nextRoundMap[round];

            if (nextRound) {
                const nextMatchIdx = Math.floor(matchIdx / 2);
                const nextTeamSlot = matchIdx % 2;
                tournament[nextRound][nextMatchIdx].teams[nextTeamSlot] = { ...selectedTeam };
            }

            render();
        }

        function render() {
            const container = document.getElementById('tournament-container');
            container.innerHTML = "";

            tournament[currentViewRound].forEach((match, mIdx) => {
                const matchHtml = `
                    <div class="space-y-1">
                        <div class="text-[9px] text-neutral-600 font-bold ml-1">MATCH ${mIdx + 1}</div>
                        <div class="bg-[#171717] rounded-lg overflow-hidden border border-neutral-800">
                            ${match.teams.map((team, tIdx) => `
                                <div onclick="advance(${currentViewRound}, ${mIdx}, ${tIdx})" 
                                     class="flex items-center justify-between p-3 ${team ? ownerClasses[team.owner] : ''} ${match.winner === tIdx ? 'winner' : ''}">
                                    <div class="flex items-center space-x-3">
                                        <img src="https://flagcdn.com/w40/${team ? team.flag : 'un'}.png" class="w-5 h-3.5 object-cover opacity-80">
                                        <span class="team-name text-sm font-bold ${!team ? 'text-neutral-700' : ''}">
                                            ${team ? team.name : '???'}
                                        </span>
                                    </div>
                                    <span class="text-[9px] font-bold text-neutral-500 uppercase tracking-tighter">
                                        ${team ? players[team.owner] : ''}
                                    </span>
                                </div>
                                ${tIdx === 0 ? '<div class="h-[1px] bg-neutral-800 mx-3"></div>' : ''}
                            `).join('')}
                        </div>
                    </div>
                `;
                container.innerHTML += matchHtml;
            });
        }

        render();
    </script>
</body>
</html>
